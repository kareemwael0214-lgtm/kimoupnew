<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كيمو اب - Kimo App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Tajawal:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Lalezar&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kimo: { main: '#0ea5e9', dark: '#0284c7', light: '#f0f9ff', panel: '#f8fafc', border: '#e2e8f0', text: '#0f172a', muted: '#64748b' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #cbd5e1; font-family: 'Cairo', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        .app-bg::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 130px; background-color: #0ea5e9; z-index: -1; }
        
        /* إطارات الحسابات */
        .frame-none { border: 2px solid transparent; }
        .frame-gold { border: 3px solid #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.5); padding: 2px; }
        .frame-gradient { padding: 3px; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .frame-gradient img { border: 2px solid white; }
        .frame-admin { border: 3px solid #eab308; padding: 2px; background: linear-gradient(to right, #eab308, #fef08a, #eab308); background-size: 200% 200%; animation: shimmer 2s infinite linear; box-shadow: 0 0 15px rgba(234, 179, 8, 0.8); }
        @keyframes shimmer { 0% {background-position: 0% 0%;} 100% {background-position: -200% 0%;} }

        /* فقاعات الشات */
        .msg-out { background-color: #dcf8c6; border-radius: 12px 12px 0 12px; }
        .msg-in { background-color: #ffffff; border-radius: 12px 12px 12px 0; }
        
        .font-lalezar { font-family: 'Lalezar'; }
        
        /* ضبط الـ Scroll */
        #messages-container { 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            height: 100%;
            scroll-behavior: smooth;
        }
        .chat-scroll-area { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: flex-end; min-height: 100%; }
        
        /* إخفاء السكرول بار */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center relative overflow-hidden app-bg">

    <!-- شاشة السبلاش -->
    <div id="splash-screen" class="fixed inset-0 bg-kimo-main z-[999] flex flex-col items-center justify-center transition-opacity duration-500">

            <i class="fas fa-bolt text-5xl text-kimo-main"></i>
        </div>
        <h1 class="text-4xl text-white font-bold font-lalezar tracking-widest">كيمو اب</h1>
        <div class="mt-8 w-10 h-10 border-4 border-white/20 border-t-white rounded-full animate-spin"></div>
    </div>

    <!-- رفع الملفات -->
    <input type="file" id="global-image-picker" accept="image/*" class="hidden">
    <input type="file" id="chat-attachment-picker" class="hidden">

    <div class="w-full h-full md:w-[98%] md:h-[96%] max-w-[1600px] bg-white md:shadow-2xl flex relative z-10 overflow-hidden md:rounded-xl">

        <!-- 1. تسجيل الدخول -->

                    <i class="fas fa-shield-halved text-4xl text-white"></i>
                </div>
                <h1 class="text-3xl text-kimo-text font-bold mb-1 font-lalezar">كيمو اب</h1>

                <div id="phone-container">
                    <div class="flex items-center border-2 border-gray-100 rounded-2xl p-2 mb-4 dir-ltr focus-within:border-kimo-main transition-all">
                        <span class="text-kimo-muted font-bold px-3 border-r border-gray-200">+20</span>
                        <input type="tel" id="phone-input" placeholder="1112215950" class="w-full p-2 outline-none text-left text-lg bg-transparent font-bold" dir="ltr">
                    </div>
                    <button onclick="requestOTP()" class="w-full bg-kimo-main hover:bg-kimo-dark text-white font-bold py-4 rounded-2xl shadow-lg transition active:scale-95">متابعة</button>
                </div>

                <div id="otp-container" class="hidden">
                    <p class="text-sm text-kimo-muted mb-4 font-bold">أدخل كود الدخول (PIN)</p>
                    <input type="password" id="otp-input" placeholder="••••••" class="w-full p-3 border-2 border-gray-100 rounded-2xl outline-none text-center tracking-[0.5em] text-3xl mb-6 font-bold bg-gray-50" dir="ltr">
                    <button onclick="verifyCode()" class="w-full bg-kimo-main hover:bg-kimo-dark text-white font-bold py-4 rounded-2xl shadow-lg mb-4 active:scale-95">تأكيد الدخول</button>
                </div>
            </div>
        </div>

        <!-- 2. واجهة التطبيق -->

            <!-- القائمة -->

                            <img id="my-avatar-img" src="" class="w-10 h-10 rounded-full object-cover bg-gray-100">
                            <i id="my-admin-crown" class="fas fa-crown text-yellow-500 absolute -top-2 -right-2 text-base hidden"></i>
                        </div>
                        <div class="overflow-hidden">
                            <div class="flex items-center gap-1">
                                <span id="my-name-display" class="font-bold text-kimo-text truncate text-sm"></span>
                                <i id="my-verified-badge" class="fas fa-check-circle text-blue-500 hidden text-[10px]"></i>

                    </div>
                    <div class="flex gap-1 shrink-0">

                            <span id="admin-req-badge" class="hidden absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border border-white"></span>
                        </button>
                        <button onclick="openCreateGroupModal()" class="text-kimo-muted hover:bg-gray-100 p-2 rounded-full"><i class="fas fa-users-cog text-lg"></i></button>
                        <button onclick="logout()" class="text-red-400 hover:bg-red-50 p-2 rounded-full"><i class="fas fa-power-off text-lg"></i></button>

            <!-- منطقة الشات -->

                <div id="messages-container" class="flex-1 p-3 md:px-[6%] bg-[url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')] bg-repeat">
                    <div class="chat-scroll-area" id="messages-wrapper">

                    </div>
                </div>

                <!-- مربع الإدخال -->

                    <div class="flex-1 bg-white rounded-2xl flex items-center px-2 shadow-sm min-h-[48px] border border-gray-200">
                        <button onclick="triggerChatAttachment()" class="text-gray-400 hover:text-kimo-main p-2"><i class="fas fa-paperclip text-xl"></i></button>
                        <input type="text" id="message-input" placeholder="اكتب هنا..." class="w-full bg-transparent outline-none py-3 px-1 text-[15px] font-semibold" onkeypress="if(event.key === 'Enter') sendMsg()">
                    </div>
                    <button onclick="sendMsg()" class="bg-kimo-main text-white rounded-full w-[48px] h-[48px] flex justify-center items-center shadow-lg active:scale-90 transition transform">
                        <i class="fas fa-rotate-180 fa-reply text-lg"></i>
                    </button>
                </div>
            </div>

            <!-- شاشة ترحيب -->
            <div class="hidden md:flex flex-col flex-1 items-center justify-center bg-[#f0f2f5] z-10" id="welcome-screen">
                <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-md mb-4">
                    <i class="fas fa-bolt text-4xl text-kimo-main animate-bounce"></i>
                </div>
                <h2 class="text-2xl text-gray-700 font-bold font-lalezar">كيمو اب</h2>
                <p class="text-gray-400 font-bold mt-2">اختر صديقاً لبدء المحادثة</p>
            </div>
        </div>
    </div>

    <!-- مودال الإعدادات -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-end md:items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-full md:max-w-md rounded-t-3xl md:rounded-3xl shadow-2xl overflow-hidden transition-all transform duration-300 translate-y-full" id="settings-modal-content">
            <div class="bg-kimo-main p-4 text-white flex justify-between items-center">
                <h2 class="font-bold"><i class="fas fa-cog ml-2"></i> إعداداتي</h2>
                <button onclick="closeProfile()"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-5 space-y-4 max-h-[75vh] overflow-y-auto bg-gray-50">
                <div class="flex flex-col items-center mb-2 relative">
                    <img id="profile-preview-img" src="" class="w-20 h-20 rounded-full object-cover border-4 border-white shadow-md">
                    <button onclick="triggerImageUpload('profile')" class="absolute bottom-0 right-1/2 translate-x-8 bg-kimo-main text-white rounded-full w-8 h-8 flex items-center justify-center border-2 border-white shadow-md"><i class="fas fa-camera text-xs"></i></button>
                </div>
                
                <div class="bg-white p-4 rounded-2xl border border-gray-200">
                    <label class="block text-[10px] font-bold text-gray-400 mb-1">كود الدخول (Password):</label>
                    <input type="text" id="set-login-code" placeholder="تغيير كود الـ 000000" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-xl outline-none font-bold text-center tracking-widest dir-ltr">
                </div>

                <div class="bg-white p-4 rounded-2xl border border-gray-200">
                    <input type="text" id="set-name" placeholder="اسمك" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-xl mb-3 outline-none font-bold">
                    <input type="text" id="set-bio" placeholder="الحالة" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-xl outline-none font-semibold">
                </div>

                <div id="admin-settings-zone" class="hidden bg-yellow-50 p-4 rounded-2xl border border-yellow-200">
                    <h3 class="font-bold text-yellow-700 text-xs mb-2"><i class="fas fa-robot"></i> الرد التلقائي للأدمن:</h3>
                    <textarea id="set-auto-reply" rows="2" placeholder="رسالة ترحيب تلقائية لمن يراسلك لأول مرة..." class="w-full p-2 bg-white border border-yellow-200 rounded-xl outline-none text-sm font-semibold"></textarea>
                </div>
                
                <div class="flex items-center justify-between p-3 bg-white rounded-2xl border border-gray-200">
                    <span class="font-bold text-xs">حساب تجاري</span>
                    <input type="checkbox" id="biz-toggle" class="w-5 h-5" onchange="toggleBiz()">
                </div>
                
                <div id="biz-zone" class="hidden space-y-3 bg-white p-4 rounded-2xl border border-gray-200">
                    <select id="set-font" class="w-full p-2 border rounded-xl font-bold outline-none bg-gray-50 text-xs">
                        <option value="font-cairo">خط كايرو</option>
                        <option value="font-tajawal">خط تجوال</option>
                        <option value="font-ruqaa">خط الرقعة</option>
                        <option value="font-lalezar">خط عريض</option>
                    </select>
                    <div class="flex justify-around bg-gray-50 p-2 rounded-xl">
                        <div class="cursor-pointer" onclick="setFrame('frame-none')"><div class="w-8 h-8 rounded-full border border-gray-300" id="f-none"></div></div>
                        <div class="cursor-pointer" onclick="setFrame('frame-gold')"><div class="w-8 h-8 rounded-full border-2 border-yellow-400" id="f-gold"></div></div>
                        <div class="cursor-pointer" onclick="setFrame('frame-gradient')"><div class="w-8 h-8 rounded-full bg-gradient-to-tr from-orange-400 to-purple-600 p-[1px]" id="f-grad"><div class="w-full h-full bg-white rounded-full"></div></div></div>
                    </div>
                    <input type="hidden" id="selected-frame" value="frame-none">
                </div>
                
                <button id="verify-btn-ui" onclick="requestVerification()" class="w-full py-3 rounded-xl font-bold text-xs bg-blue-50 text-blue-600 border border-blue-100 transition">طلب توثيق الحساب ✓</button>
            </div>
            <div class="p-4 bg-white border-t">
                <button onclick="saveProfile()" class="w-full bg-kimo-main text-white font-bold py-3.5 rounded-2xl shadow-xl transition">حفظ التغييرات</button>
            </div>
        </div>
    </div>

    <!-- مراجعة الأدمن -->
    <div id="admin-modal" class="hidden fixed inset-0 bg-black/70 z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl">
            <div class="bg-gray-900 p-4 text-white flex justify-between items-center">
                <h3 class="font-bold">طلبات التوثيق</h3>
                <button onclick="closeAdminPanel()"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-4 max-h-[60vh] overflow-y-auto bg-gray-50" id="admin-requests-list"></div>
        </div>
    </div>

    <!-- مراجعة الأدمن للفرد -->
    <div id="admin-review-modal" class="hidden fixed inset-0 bg-black/80 z-[120] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl text-center pb-6">
            <div class="p-6">
                <img id="review-avatar" src="" class="w-20 h-20 rounded-full object-cover mx-auto mb-3 border-4 border-gray-100">
                <h3 id="review-name" class="font-bold text-lg text-gray-800"></h3>
                <p id="review-phone" class="text-xs text-gray-500 dir-ltr mb-3"></p>
                <p id="review-bio" class="text-xs text-gray-600 bg-gray-50 p-3 rounded-xl mb-6 italic"></p>
                <input type="hidden" id="review-target-phone">
                <div class="flex gap-3">
                    <button onclick="confirmVerification()" class="flex-1 bg-green-500 text-white font-bold py-3 rounded-xl">قبول</button>
                    <button onclick="rejectVerification()" class="flex-1 bg-red-500 text-white font-bold py-3 rounded-xl">رفض</button>
                </div>
            </div>
        </div>
    </div>

    <!-- إنشاء جروب -->
    <div id="create-group-modal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl">
            <div class="bg-kimo-main p-4 text-white text-center font-bold">مجموعة جديدة</div>
            <div class="p-6 text-center bg-gray-50">
                <div class="relative w-20 h-20 mx-auto mb-4">
                    <img id="new-group-preview" src="https://ui-avatars.com/api/?name=G&background=0ea5e9&color=fff" class="w-full h-full rounded-full object-cover border-2 border-white shadow-md">
                    <button onclick="triggerImageUpload('newGroup')" class="absolute bottom-0 right-0 bg-kimo-main text-white rounded-full w-7 h-7 flex items-center justify-center border border-white"><i class="fas fa-camera text-[10px]"></i></button>
                </div>
                <input type="text" id="group-name-input" placeholder="اسم المجموعة..." class="w-full p-3 bg-white border border-gray-200 rounded-2xl outline-none mb-6 font-bold text-center">
                <div class="flex gap-3">
                    <button onclick="createNewGroup()" class="flex-1 bg-kimo-main text-white font-bold py-3 rounded-xl">إنشاء</button>
                    <button onclick="closeCreateGroupModal()" class="flex-1 bg-gray-200 text-gray-600 font-bold py-3 rounded-xl">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

    <!-- معلومات الجروب -->
    <div id="group-settings-modal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-end md:items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-full md:max-w-md rounded-t-3xl md:rounded-3xl shadow-2xl overflow-hidden transition-all transform translate-y-full duration-300" id="group-settings-content">
            <div class="bg-gray-800 p-4 text-white flex justify-between items-center font-bold">
                <h3>معلومات المجموعة</h3>
                <button onclick="closeGroupSettingsModal()"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-5 space-y-4 bg-gray-50">
                <div id="group-admin-tools" class="flex flex-col items-center bg-white p-4 rounded-2xl border border-gray-100 hidden">
                    <div class="relative w-16 h-16 mb-2">
                        <img id="edit-group-preview" src="" class="w-full h-full rounded-full object-cover border border-gray-200">
                        <button onclick="triggerImageUpload('editGroup')" class="absolute bottom-0 right-0 bg-kimo-main text-white w-6 h-6 rounded-full flex items-center justify-center border border-white"><i class="fas fa-camera text-[10px]"></i></button>
                    </div>
                    <input type="text" id="edit-group-name" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-xl outline-none font-bold text-center mb-3">
                    <button onclick="updateGroupDetails()" class="w-full bg-green-500 text-white font-bold py-2 rounded-xl text-xs">تعديل البيانات</button>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-gray-100">
                    <h4 class="font-bold text-xs mb-3 text-kimo-muted">إضافة عضو بالرقم:</h4>
                    <div class="flex gap-2">
                        <input type="tel" id="add-member-input" placeholder="010xxxxxxxx" class="flex-1 p-2 bg-gray-50 border border-gray-200 rounded-xl outline-none font-bold text-sm text-center dir-ltr">
                        <button onclick="addMemberToGroup()" class="bg-kimo-main text-white font-bold px-4 rounded-xl text-xs">إضافة</button>
                    </div>
                </div>
                <div id="group-action-buttons"></div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         4. JAVASCRIPT LOGIC
    =========================================== -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBS3GcNh5ltgwUqSClSTUoRNgdJiTOf0RM",
            authDomain: "whatsapp-fcd3c.firebaseapp.com",
            projectId: "whatsapp-fcd3c",
            storageBucket: "whatsapp-fcd3c.firebasestorage.app",
            messagingSenderId: "369090984748",
            appId: "1:369090984748:web:cba013025b108578cd0a89"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const ADMIN_PHONE = "+201112215950"; // رقم الأدمن الحقيقي

        let currentUserPhone = localStorage.getItem('kimo_phone'); 
        let activeChatId = null;
        let isGroupChat = false;
        let unsubscribeMessages = null;
        
        let usersCache = {};
        let groupsList = [];
        let myContacts = []; 
        let tempPhoneInput = "";
        
        let currentImageTarget = ''; 
        let profileBase64 = '';
        let newGroupBase64 = '';
        let editGroupBase64 = '';

        // Splash
        setTimeout(() => {
            document.getElementById('splash-screen').classList.add('opacity-0');
            setTimeout(() => { 
                document.getElementById('splash-screen').classList.add('hidden'); 
                if(currentUserPhone) initApp();
                else document.getElementById('auth-screen').classList.remove('hidden');
            }, 500);
        }, 1500);

        // --- نظام الصور والملفات ---
        function triggerImageUpload(target) {
            currentImageTarget = target;
            document.getElementById('global-image-picker').click();
        }
        document.getElementById('global-image-picker').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const MAX = 400;
                    if(w > h) { if(w > MAX) { h *= MAX / w; w = MAX; } } else { if(h > MAX) { w *= MAX / h; h = MAX; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    const base64Str = canvas.toDataURL('image/jpeg', 0.7);
                    if(currentImageTarget === 'profile') {
                        profileBase64 = base64Str;
                        document.getElementById('profile-preview-img').src = base64Str;
                    } else if(currentImageTarget === 'newGroup') {
                        newGroupBase64 = base64Str;
                        document.getElementById('new-group-preview').src = base64Str;
                    } else if(currentImageTarget === 'editGroup') {
                        editGroupBase64 = base64Str;
                        document.getElementById('edit-group-preview').src = base64Str;
                    }
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        function triggerChatAttachment() {
            document.getElementById('chat-attachment-picker').click();
        }
        document.getElementById('chat-attachment-picker').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const MAX_SIZE = 700 * 1024; // 700KB

            if(file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = async function() {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const MAX = 800;
                        if(w > h) { if(w > MAX) { h *= MAX / w; w = MAX; } } else { if(h > MAX) { w *= MAX / h; h = MAX; } }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        await sendFileMsg('image', canvas.toDataURL('image/jpeg', 0.6), 'صورة');
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            } else {
                if(file.size > MAX_SIZE) return alert("الملف كبير جداً (الأقصى 700KB)");
                const reader = new FileReader();
                reader.onload = async (event) => await sendFileMsg('file', event.target.result, file.name);
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        });

        async function sendFileMsg(type, data, fileName) {
            if(!activeChatId) return;
            const chatId = isGroupChat ? activeChatId : [currentUserPhone, activeChatId].sort().join('_');
            await db.collection('messages').add({ 
                chatId: chatId, text: '', type: type, fileData: data, fileName: fileName,
                sender: currentUserPhone, timestamp: firebase.firestore.FieldValue.serverTimestamp() 
            });
        }

        // --- الدخول ---
        function requestOTP() {
            let p = document.getElementById('phone-input').value.trim();
            if(!p) return alert('أدخل رقم الهاتف');
            if(p.startsWith('0')) p = p.substring(1);
            tempPhoneInput = p.startsWith('+20') ? p : '+20' + p;
            document.getElementById('phone-container').classList.add('hidden');
            document.getElementById('otp-container').classList.remove('hidden');
        }

        async function verifyCode() {
            const entered = document.getElementById('otp-input').value.trim();
            if(!entered) return alert("أدخل الكود!");
            try {
                const userRef = db.collection('users').doc(tempPhoneInput);
                const snap = await userRef.get();
                if (snap.exists) {
                    const actual = snap.data().loginCode || '000000';
                    if (entered !== actual) return alert("الكود غير صحيح!");
                } else {
                    if (entered !== '000000') return alert("كود الدخول الافتراضي هو 000000");
                    await userRef.set({
                        phone: tempPhoneInput, displayName: tempPhoneInput,
                        bio: 'أستخدم كيمو اب!', avatar: '', isVerified: false,
                        isBusiness: false, font: 'font-cairo', frame: 'frame-none',
                        loginCode: '000000', contacts: [], createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                currentUserPhone = tempPhoneInput;
                localStorage.setItem('kimo_phone', currentUserPhone);
                initApp();
            } catch (err) { alert("خطأ في الاتصال."); }
        }

        function logout() { localStorage.clear(); location.reload(); }

        // --- التهيئة ---
        function initApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');

            let isAdmin = currentUserPhone === ADMIN_PHONE;
            if(isAdmin) {
                document.getElementById('admin-panel-btn').classList.remove('hidden');
                document.getElementById('admin-settings-zone').classList.remove('hidden');
                db.collection('verifications').onSnapshot(snap => {
                    document.getElementById('admin-req-badge').classList.toggle('hidden', snap.empty);
                });
            }

            db.collection('users').doc(currentUserPhone).onSnapshot((docSnap) => {
                if(docSnap.exists) {
                    const me = docSnap.data();
                    myContacts = me.contacts || [];

                    let myFont = isAdmin ? 'font-lalezar' : (me.isBusiness ? me.font : '');
                    let myFrame = isAdmin ? 'frame-admin' : (me.isBusiness ? me.frame : '');
                    
                    document.getElementById('my-admin-crown').classList.toggle('hidden', !isAdmin);
                    document.getElementById('my-name-display').innerText = me.displayName;
                    document.getElementById('my-name-display').className = `font-bold text-kimo-text truncate text-sm ${myFont}`;
                    document.getElementById('my-bio-display').innerText = me.bio;
                    
                    const avatarSrc = me.avatar || `https://ui-avatars.com/api/?name=${me.displayName}&background=0ea5e9&color=fff`;
                    document.getElementById('my-avatar-img').src = avatarSrc;
                    document.getElementById('profile-preview-img').src = avatarSrc;
                    profileBase64 = me.avatar || '';

                    document.getElementById('my-avatar-wrap').className = `rounded-full shrink-0 relative ${myFrame}`;
                    document.getElementById('my-verified-badge').classList.toggle('hidden', !me.isVerified);
                    
                    document.getElementById('set-name').value = me.displayName || '';
                    document.getElementById('set-bio').value = me.bio || '';
                    document.getElementById('biz-toggle').checked = me.isBusiness || false;
                    document.getElementById('biz-zone').classList.toggle('hidden', !me.isBusiness);
                    document.getElementById('set-font').value = me.font || 'font-cairo';
                    if(isAdmin) document.getElementById('set-auto-reply').value = me.autoReplyMessage || '';

                    setFrame(me.frame || 'frame-none');
                    renderContactsList();
                }
            });
            loadAllContacts();
        }

        function loadAllContacts() {
            db.collection('users').onSnapshot((snap) => {
                snap.docs.forEach(d => usersCache[d.id] = d.data());
                renderContactsList();
            });
            db.collection('groups').where('members', 'array-contains', currentUserPhone).onSnapshot((snap) => {
                groupsList = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderContactsList();
            });
        }

        function renderContactsList() {
            const list = document.getElementById('contacts-list');
            list.innerHTML = '';
            let count = 0;

            groupsList.forEach(g => {
                count++;
                const avatar = g.avatar || `https://ui-avatars.com/api/?name=${g.name}&background=0ea5e9&color=fff`;
                list.innerHTML += `<div class="flex items-center px-4 py-3.5 cursor-pointer hover:bg-gray-50 border-b border-gray-100 transition" onclick="openChatView('${g.id}', true)"><div class="w-10 h-10 rounded-full mr-3 shrink-0 border border-kimo-light"><img src="${avatar}" class="w-full h-full rounded-full object-cover"></div><div class="flex-1 overflow-hidden"><h3 class="font-bold text-kimo-text truncate text-sm">${g.name}</h3><p class="text-[10px] text-kimo-main font-bold">دردشة جماعية</p></div></div>`;
            });

            Object.values(usersCache).forEach(u => {
                if(u.phone === currentUserPhone || !myContacts.includes(u.phone)) return;
                count++;
                let isAdmin = u.phone === ADMIN_PHONE;
                let frameClass = isAdmin ? 'frame-admin' : (u.isBusiness ? u.frame : '');
                let fontClass = isAdmin ? 'font-lalezar text-yellow-600' : (u.isBusiness ? u.font : '');
                let avatarUrl = u.avatar || `https://ui-avatars.com/api/?name=${u.displayName}&background=random`;

                list.innerHTML += `<div class="flex items-center px-4 py-3.5 cursor-pointer hover:bg-gray-50 border-b border-gray-100 transition" onclick="openChatView('${u.phone}', false)"><div class="mr-3 shrink-0 relative ${frameClass} rounded-full"><img src="${avatarUrl}" class="w-10 h-10 rounded-full object-cover bg-gray-200">${isAdmin ? '<i class="fas fa-crown text-yellow-500 absolute -top-1 -right-1 text-[10px]"></i>':''}</div><div class="flex-1 overflow-hidden"><div class="flex items-center gap-1 mb-0.5"><h3 class="font-bold text-kimo-text truncate text-sm ${fontClass}">${u.displayName}</h3>${u.isVerified ? '<i class="fas fa-check-circle text-blue-500 text-[10px]"></i>':''}</div><p class="text-[10px] text-kimo-muted truncate font-semibold">${u.bio}</p></div></div>`;
            });

            if(count === 0) list.innerHTML = `<div class="p-10 text-center text-gray-300 font-bold">لا توجد محادثات.</div>`;
        }

        // --- الشات والترتيب البرمجي ---
        function openChatView(id, isGroup) {
            activeChatId = id; isGroupChat = isGroup;
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('chat-area').classList.remove('hidden');

            const title = document.getElementById('active-chat-title');
            const avatar = document.getElementById('active-chat-avatar');
            const status = document.getElementById('active-chat-status');
            const wrap = document.getElementById('chat-header-avatar-wrap');
            const verified = document.getElementById('active-chat-verified');
            const crown = document.getElementById('active-chat-admin-crown');

            if(isGroup) {
                const group = groupsList.find(g => g.id === id);
                title.innerText = group ? group.name : 'مجموعة';
                avatar.src = group.avatar || `https://ui-avatars.com/api/?name=${title.innerText}&background=0ea5e9&color=fff`;
                status.innerText = `دردشة جماعية`;
                wrap.className = "rounded-full mr-2 shrink-0 border border-gray-100 relative";
                verified.classList.add('hidden'); crown.classList.add('hidden');
            } else {
                const user = usersCache[id];
                if(user) {
                    let isAdmin = user.phone === ADMIN_PHONE;
                    title.innerText = user.displayName;
                    title.className = `font-bold text-[14px] truncate ${isAdmin ? 'font-lalezar text-yellow-600' : (user.isBusiness ? user.font : 'text-kimo-text')}`;
                    avatar.src = user.avatar || `https://ui-avatars.com/api/?name=${user.displayName}&background=random`;
                    status.innerText = user.bio;
                    wrap.className = `rounded-full mr-2 shrink-0 relative ${isAdmin ? 'frame-admin' : (user.isBusiness ? user.frame : '')}`;
                    verified.classList.toggle('hidden', !user.isVerified);
                    if(isAdmin) crown.classList.remove('hidden'); else crown.classList.add('hidden');
                }
            }
            document.querySelector('.w-full.md\\:w-\\[30\\%\\]').classList.add('hidden', 'md:flex');
            loadMessages();
        }

        function closeChatArea() {
            document.getElementById('chat-area').classList.add('hidden');
            document.querySelector('.w-full.md\\:w-\\[30\\%\\]').classList.remove('hidden');
            activeChatId = null;
        }

        function loadMessages() {
            const wrapper = document.getElementById('messages-wrapper');
            const container = document.getElementById('messages-container');
            const chatId = isGroupChat ? activeChatId : [currentUserPhone, activeChatId].sort().join('_');
            
            if(unsubscribeMessages) unsubscribeMessages();
            // الحل السحري: استعلام بدون OrderBy
            unsubscribeMessages = db.collection('messages').where('chatId', '==', chatId).onSnapshot((snap) => {
                let msgs = [];
                snap.forEach(doc => msgs.push({ id: doc.id, ...doc.data() }));
                
                // الترتيب برمجياً هنا بالوقت
                msgs.sort((a, b) => (a.timestamp?.toMillis() || 0) - (b.timestamp?.toMillis() || 0));

                wrapper.innerHTML = `<div class="flex justify-center mb-6 w-full"><div class="bg-white/70 text-blue-800 text-[10px] py-1 px-4 rounded-full shadow-sm font-bold border border-blue-100"><i class="fas fa-lock ml-1"></i> محادثات كيمو اب مشفرة وآمنة</div></div>`;
                
                msgs.forEach(m => {
                    const isMe = m.sender === currentUserPhone;
                    const senderInfo = usersCache[m.sender] || {displayName: m.sender};
                    let timeStr = m.timestamp ? m.timestamp.toDate().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}) : '';
                    
                    let contentHtml = '';
                    if(m.type === 'image') contentHtml = `<img src="${m.fileData}" class="w-full rounded-lg mt-1 cursor-pointer" onclick="window.open(this.src)">`;
                    else if(m.type === 'file') contentHtml = `<a href="${m.fileData}" download="${m.fileName}" class="flex items-center justify-between bg-black/5 p-2 rounded-lg mt-1 border border-black/5 text-gray-700"><i class="fas fa-file-alt text-kimo-main"></i><span class="text-[10px] font-bold truncate">${m.fileName}</span><i class="fas fa-download text-xs"></i></a>`;
                    else contentHtml = `<p class="text-[14.5px] font-semibold text-gray-800 leading-snug break-words">${m.text}</p>`;

                    wrapper.insertAdjacentHTML('beforeend', `
                        <div class="${isMe ? 'self-end' : 'self-start'} max-w-[85%] mb-1">
                            <div class="${isMe ? 'msg-out' : 'msg-in'} px-3 pt-1.5 pb-2 relative min-w-[90px] border border-gray-100">
                                ${!isMe && isGroupChat ? `<p class="text-[10px] font-bold text-kimo-main mb-0.5">${senderInfo.displayName}</p>` : ''}
                                ${contentHtml}
                                <div class="text-left mt-0.5 flex items-center justify-end gap-1">
                                    <p class="text-[8px] text-gray-400 font-bold">${timeStr}</p>
                                    ${isMe ? '<i class="fas fa-check-double text-blue-400 text-[9px]"></i>' : ''}
                                </div>
                            </div>
                        </div>`);
                });
                
                // التمرير لأسفل فوراً (حل مشكلة عدم النزول)
                container.scrollTop = container.scrollHeight;
            });
        }

        async function sendMsg() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if(!text || !activeChatId) return;
            const chatId = isGroupChat ? activeChatId : [currentUserPhone, activeChatId].sort().join('_');
            input.value = ''; input.focus();
            await db.collection('messages').add({ chatId, text, type: 'text', sender: currentUserPhone, timestamp: firebase.firestore.FieldValue.serverTimestamp() });

            // ميزة الرد التلقائي للأدمن
            if(!isGroupChat && activeChatId === ADMIN_PHONE && currentUserPhone !== ADMIN_PHONE) {
                const snap = await db.collection('messages').where('chatId', '==', chatId).get();
                if(snap.size === 1) { // أول رسالة فقط
                    const adminSnap = await db.collection('users').doc(ADMIN_PHONE).get();
                    if(adminSnap.exists && adminSnap.data().autoReplyMessage) {
                        await db.collection('messages').add({ chatId, text: adminSnap.data().autoReplyMessage, type: 'text', sender: ADMIN_PHONE, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                    }
                }
            }
        }

        // باقي الوظائف (إضافة، بروفايل، جروبات) كما هي مع تحسين الأداء
        async function startNewChat() {
            let p = prompt("أدخل رقم الهاتف:"); if(!p) return;
            if(p.startsWith('0')) p = p.substring(1); p = p.startsWith('+20') ? p : '+20' + p;
            const snap = await db.collection('users').doc(p).get();
            if(snap.exists) {
                await db.collection('users').doc(currentUserPhone).update({ contacts: firebase.firestore.FieldValue.arrayUnion(p) });
                await db.collection('users').doc(p).update({ contacts: firebase.firestore.FieldValue.arrayUnion(currentUserPhone) });
                openChatView(p, false);
            } else alert("غير مسجل في كيمو اب!");
        }

        function openProfile() { 
            document.getElementById('settings-modal').classList.remove('hidden'); 
            setTimeout(() => document.getElementById('settings-modal-content').classList.remove('translate-y-full'), 10);
        }
        function closeProfile() { 
            document.getElementById('settings-modal-content').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('settings-modal').classList.add('hidden'), 300);
        }
        function toggleBiz() { document.getElementById('biz-zone').classList.toggle('hidden', !document.getElementById('biz-toggle').checked); }
        function setFrame(f) {
            document.getElementById('selected-frame').value = f;
            ['f-none','f-gold','f-grad'].forEach(id => document.getElementById(id).classList.remove('ring-2','ring-kimo-main'));
            const map = {'frame-none':'f-none','frame-gold':'f-gold','frame-gradient':'f-grad'};
            document.getElementById(map[f]).classList.add('ring-2','ring-kimo-main');
        }

        async function saveProfile() {
            let upd = { displayName: document.getElementById('set-name').value.trim(), bio: document.getElementById('set-bio').value.trim(), avatar: profileBase64, isBusiness: document.getElementById('biz-toggle').checked, font: document.getElementById('set-font').value, frame: document.getElementById('selected-frame').value };
            const nCode = document.getElementById('set-login-code').value.trim();
            if(nCode) upd.loginCode = nCode;
            if(currentUserPhone === ADMIN_PHONE) upd.autoReplyMessage = document.getElementById('set-auto-reply').value.trim();
            await db.collection('users').doc(currentUserPhone).set(upd, { merge: true });
            closeProfile();
        }

        async function requestVerification() {
            if(currentUserPhone === ADMIN_PHONE) return alert("أنت المالك!");
            await db.collection('verifications').doc(currentUserPhone).set({ phone: currentUserPhone, name: usersCache[currentUserPhone].displayName, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            alert("تم إرسال الطلب للمراجعة.");
        }

        function openAdminPanel() {
            document.getElementById('admin-modal').classList.remove('hidden');
            const list = document.getElementById('admin-requests-list');
            db.collection('verifications').onSnapshot(snap => {
                if(snap.empty) { list.innerHTML = `<div class="text-center p-10 text-gray-400">لا توجد طلبات.</div>`; return; }
                list.innerHTML = '';
                snap.forEach(doc => {
                    const req = doc.data();
                    list.innerHTML += `<div class="bg-white p-3 rounded-2xl mb-3 shadow-sm flex justify-between items-center"><div><p class="font-bold text-xs">${req.name}</p></div><button onclick="viewUserProfile('${req.phone}')" class="bg-kimo-main text-white px-4 py-2 rounded-xl text-[10px] font-bold">مراجعة</button></div>`;
                });
            });
        }
        function closeAdminPanel() { document.getElementById('admin-modal').classList.add('hidden'); }
        function viewUserProfile(phone) {
            const u = usersCache[phone]; if(!u) return;
            document.getElementById('review-avatar').src = u.avatar || `https://ui-avatars.com/api/?name=${u.displayName}&background=0ea5e9&color=fff`;
            document.getElementById('review-name').innerText = u.displayName;
            document.getElementById('review-phone').innerText = u.phone;
            document.getElementById('review-bio').innerText = u.bio;
            document.getElementById('review-target-phone').value = u.phone;
            document.getElementById('admin-review-modal').classList.remove('hidden');
        }
        async function confirmVerification() {
            const p = document.getElementById('review-target-phone').value;
            await db.collection('users').doc(p).update({ isVerified: true });
            await db.collection('verifications').doc(p).delete();
            document.getElementById('admin-review-modal').classList.add('hidden');
        }
        async function rejectVerification() {
            await db.collection('verifications').doc(document.getElementById('review-target-phone').value).delete();
            document.getElementById('admin-review-modal').classList.add('hidden');
        }

        // الجروبات
        function openCreateGroupModal() { document.getElementById('create-group-modal').classList.remove('hidden'); }
        function closeCreateGroupModal() { document.getElementById('create-group-modal').classList.add('hidden'); }
        async function createNewGroup() {
            const n = document.getElementById('group-name-input').value.trim(); if(!n) return;
            await db.collection('groups').add({ name: n, avatar: newGroupBase64, createdBy: currentUserPhone, members: [currentUserPhone], createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            closeCreateGroupModal();
        }

        function handleChatHeaderClick() {
            if(!isGroupChat) return; 
            const g = groupsList.find(gr => gr.id === activeChatId); if(!g) return;
            const isOwn = g.createdBy === currentUserPhone;
            document.getElementById('edit-group-name').value = g.name;
            document.getElementById('edit-group-preview').src = g.avatar || `https://ui-avatars.com/api/?name=${g.name}&background=0ea5e9&color=fff`;
            editGroupBase64 = g.avatar || '';
            document.getElementById('group-admin-tools').classList.toggle('hidden', !isOwn);
            document.getElementById('group-action-buttons').innerHTML = isOwn ? `<button onclick="deleteCurrentGroup()" class="w-full py-3 rounded-xl font-bold text-xs border border-red-500 text-red-500">حذف المجموعة بالكامل</button>` : `<button onclick="leaveCurrentGroup()" class="w-full py-3 rounded-xl font-bold text-xs bg-red-50 text-red-500">خروج من المجموعة</button>`;
            document.getElementById('group-settings-modal').classList.remove('hidden');
            setTimeout(()=> document.getElementById('group-settings-content').classList.remove('translate-y-full'), 10);
        }
        function closeGroupSettingsModal() {
            document.getElementById('group-settings-content').classList.add('translate-y-full');
            setTimeout(()=> document.getElementById('group-settings-modal').classList.add('hidden'), 300);
        }
        async function updateGroupDetails() {
            await db.collection('groups').doc(activeChatId).update({ name: document.getElementById('edit-group-name').value.trim(), avatar: editGroupBase64 });
            closeGroupSettingsModal();
        }
        async function addMemberToGroup() {
            let p = document.getElementById('add-member-input').value.trim();
            if(p.startsWith('0')) p = p.substring(1); p = p.startsWith('+20') ? p : '+20' + p;
            const s = await db.collection('users').doc(p).get(); if(!s.exists) return alert("غير مسجل!");
            await db.collection('groups').doc(activeChatId).update({ members: firebase.firestore.FieldValue.arrayUnion(p) });
            alert("تمت الإضافة!");
        }
        async function deleteCurrentGroup() { if(confirm("حذف؟")) { await db.collection('groups').doc(activeChatId).delete(); closeChatArea(); closeGroupSettingsModal(); } }
        async function leaveCurrentGroup() { if(confirm("خروج؟")) { await db.collection('groups').doc(activeChatId).update({ members: firebase.firestore.FieldValue.arrayRemove(currentUserPhone) }); closeChatArea(); closeGroupSettingsModal(); } }
    </script>
