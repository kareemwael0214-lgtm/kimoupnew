<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIMO PRO - SMS & Voice</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Lalezar&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase Compat SDKs (ضرورية جداً للـ SMS) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kimo: { main: '#0ea5e9', dark: '#0284c7', light: '#f0f9ff', border: '#e2e8f0', text: '#0f172a' }
                    }
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: #cbd5e1; font-family: 'Cairo', sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        .app-container { width: 100%; height: 100%; background: white; position: relative; display: flex; overflow: hidden; }
        @media (min-width: 768px) { .app-container { width: 420px; height: 850px; border-radius: 2.5rem; border: 12px solid #1e293b; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5); } }

        /* الشات الذكي */
        #messages-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 15px; gap: 10px; background-color: #efeae2; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg-bubble { max-width: 85%; padding: 10px 14px; font-weight: 600; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-out { background-color: #dcf8c6; border-radius: 15px 15px 0 15px; align-self: flex-end; }
        .msg-in { background-color: #ffffff; border-radius: 15px 15px 15px 0; align-self: flex-start; }

        .font-lalezar { font-family: 'Lalezar', cursive; }
        #recaptcha-container { display: none; visibility: hidden; }
        
        audio { height: 35px; width: 200px; }
    </style>
</head>
<body>

    <div id="recaptcha-container"></div>

    <div class="app-container">

        <!-- 1. شاشة الدخول بالـ SMS -->
        <div id="auth-screen" class="absolute inset-0 bg-white z-50 flex flex-col items-center justify-center p-8 text-center hidden">
            <div id="phone-step" class="w-full">
                <div class="w-24 h-24 bg-kimo-main rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-2xl text-white">
                    <i class="fas fa-paper-plane text-5xl"></i>
                </div>
                <h2 class="text-3xl font-bold font-lalezar text-kimo-text mb-2">KIMO CHAT</h2>
                <p class="text-gray-400 text-sm mb-10 font-bold">تحقق سريع عبر SMS جوجل</p>
                <div class="bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 flex items-center mb-6 focus-within:border-kimo-main transition-all">
                    <span class="text-gray-400 font-bold ml-3 border-l pl-3">+20</span>
                    <input type="tel" id="phone-input" placeholder="1112215950" class="w-full bg-transparent outline-none font-bold text-lg dir-ltr">
                </div>
                <button onclick="sendOTP()" id="btn-otp" class="w-full bg-kimo-main text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">إرسال كود التفعيل</button>
            </div>

            <div id="otp-step" class="w-full hidden">
                <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg text-white">
                    <i class="fas fa-shield-check text-4xl"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">أدخل الرمز</h2>
                <p class="text-gray-400 text-xs mb-8">وصلتك رسالة SMS بالرمز</p>
                <input type="text" id="otp-input" placeholder="000000" class="w-full p-4 border-2 border-gray-100 rounded-2xl mb-6 text-center text-3xl font-bold tracking-[0.5em] bg-gray-50 outline-none">
                <button onclick="verifyOTP()" class="w-full bg-green-500 text-white font-bold py-4 rounded-2xl shadow-lg transition">تأكيد ودخول</button>
            </div>
        </div>

        <!-- 2. واجهة التطبيق -->
        <div id="app-content" class="w-full h-full flex flex-col hidden">
            <div class="h-[75px] border-b flex items-center justify-between px-6 bg-white shrink-0 shadow-sm z-30">
                <h1 class="font-lalezar text-xl text-kimo-main">KIMO PRO</h1>
                <button onclick="logout()" class="w-10 h-10 bg-red-50 text-red-400 rounded-xl flex items-center justify-center"><i class="fas fa-power-off"></i></button>
            </div>
            <div id="contacts-list" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
            <div class="p-4 border-t bg-gray-50/50"><button onclick="startNewChat()" class="w-full bg-kimo-main text-white py-3.5 rounded-2xl font-bold shadow-lg flex justify-center items-center gap-2">+ محادثة جديدة</button></div>

            <!-- شاشة الشات -->
            <div id="chat-page" class="absolute inset-0 bg-white z-[60] flex flex-col hidden">
                <div class="h-[75px] border-b flex items-center px-4 bg-white shadow-sm">
                    <button onclick="closeChat()" class="p-2 text-gray-400"><i class="fas fa-arrow-right text-xl"></i></button>
                    <div id="active-title" class="font-bold text-sm text-kimo-text mr-2 flex-1"></div>
                    <div class="status-dot w-2 h-2 bg-green-500 rounded-full ml-2"></div>
                </div>
                <div id="messages-container"><div id="msg-wrapper" class="flex flex-col gap-3"></div></div>
                <div class="p-3 bg-white border-t flex gap-2 items-center">
                    <button id="btn-voice" onclick="startVoice()" class="text-gray-400 hover:text-kimo-main p-2 transition"><i class="fas fa-microphone text-xl"></i></button>
                    <input type="text" id="m-input" placeholder="اكتب رسالتك..." class="flex-1 bg-gray-100 rounded-[25px] px-4 py-3 outline-none font-semibold text-sm">
                    <button onclick="sendText()" class="w-11 h-11 bg-kimo-main text-white rounded-full flex items-center justify-center shadow-lg active:scale-90 transition"><i class="fas fa-paper-plane rotate-[225deg]"></i></button>
                </div>
                <!--overlay الفويس -->
                <div id="voice-rec" class="absolute inset-x-0 bottom-0 bg-white p-6 border-t shadow-2xl z-40 hidden flex flex-col items-center gap-4">
                    <div class="flex items-center gap-2 text-red-500 font-bold"><i class="fas fa-circle animate-pulse"></i> <span id="timer">00:00</span></div>
                    <div class="flex gap-4">
                        <button onclick="stopVoice(false)" class="text-gray-400 font-bold px-4 py-2 border rounded-xl">إلغاء</button>
                        <button onclick="stopVoice(true)" class="bg-red-500 text-white font-bold px-8 py-2 rounded-xl shadow-lg">إرسال</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBS3GcNh5ltgwUqSClSTUoRNgdJiTOf0RM",
            authDomain: "whatsapp-fcd3c.firebaseapp.com",
            projectId: "whatsapp-fcd3c",
            storageBucket: "whatsapp-fcd3c.firebasestorage.app",
            messagingSenderId: "369090984748",
            appId: "1:369090984748:web:cba013025b108578cd0a89"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(), auth = firebase.auth();

        let user = localStorage.getItem('kimo_u'), activeId = null, uCache = {}, confirmResult = null;
        let mediaRec, audioChunks = [], timerInt, secs = 0;

        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });

        if(user) init(); else document.getElementById('auth-screen').classList.remove('hidden');

        async function sendOTP() {
            let p = document.getElementById('phone-input').value.trim();
            if(!p) return; if(p.startsWith('0')) p = p.substring(1);
            document.getElementById('btn-otp').innerText = "جاري الإرسال...";
            auth.signInWithPhoneNumber("+20"+p, window.recaptchaVerifier)
                .then((res) => { confirmResult = res; document.getElementById('phone-step').classList.add('hidden'); document.getElementById('otp-step').classList.remove('hidden'); })
                .catch((err) => { alert("خطأ! تأكد من إضافة الدومين في Authorized Domains بفايربيز."); location.reload(); });
        }

        async function verifyOTP() {
            const code = document.getElementById('otp-input').value.trim();
            confirmResult.confirm(code).then(async (res) => {
                user = res.user.phoneNumber; localStorage.setItem('kimo_u', user);
                await db.collection('users').doc(user).set({ phone: user, displayName: "مستخدم "+user.slice(-4), status: 'active' }, {merge:true});
                init();
            }).catch(() => alert("الكود خطأ!"));
        }

        function init() {
            document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('app-content').classList.remove('hidden');
            db.collection('users').onSnapshot(s => { s.docs.forEach(d => uCache[d.id] = d.data()); render(); });
        }

        function render() {
            const list = document.getElementById('contacts-list'); list.innerHTML = '';
            Object.values(uCache).forEach(u => {
                if(u.phone === user) return;
                list.innerHTML += `<div onclick="openChat('${u.phone}')" class="bg-white p-4 rounded-3xl flex items-center shadow-sm border border-gray-50 active:scale-95 transition"><img src="https://ui-avatars.com/api/?name=${u.displayName}&background=0ea5e9&color=fff" class="w-12 h-12 rounded-2xl ml-3 shadow-sm"><div class="flex-1 overflow-hidden"><h3 class="font-bold text-sm text-gray-700 truncate">${u.displayName}</h3><p class="text-[10px] text-green-500 font-bold uppercase">Online</p></div><i class="fas fa-chevron-left text-gray-200 text-xs"></i></div>`;
            });
        }

        function openChat(id) { activeId = id; document.getElementById('chat-page').classList.remove('hidden'); document.getElementById('active-title').innerText = uCache[id].displayName; load(); }
        
        function load() {
            const cid = [user, activeId].sort().join('_'), cont = document.getElementById('messages-container');
            db.collection('messages').where('chatId', '==', cid).onSnapshot(s => {
                const w = document.getElementById('msg-wrapper');
                let msgs = []; s.forEach(d => msgs.push(d.data()));
                msgs.sort((a,b) => (a.t?.toMillis() || 0) - (b.t?.toMillis() || 0));
                w.innerHTML = '';
                msgs.forEach(m => {
                    const isMe = m.s === user;
                    let content = m.type === 'voice' ? `<audio controls src="${m.data}"></audio>` : `<p>${m.txt}</p>`;
                    w.insertAdjacentHTML('beforeend', `<div class="flex flex-col ${isMe?'items-end':'items-start'} w-full"><div class="msg-bubble ${isMe?'msg-out':'msg-in'}">${content}</div></div>`);
                });
                cont.scrollTop = cont.scrollHeight;
            });
        }

        async function sendText() {
            const i = document.getElementById('m-input'), txt = i.value.trim(); if(!txt) return;
            const cid = [user, activeId].sort().join('_'); i.value = '';
            await db.collection('messages').add({ chatId: cid, txt, s: user, type: 'text', t: firebase.firestore.FieldValue.serverTimestamp() });
        }

        // الفويس
        async function startVoice() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRec = new MediaRecorder(stream); audioChunks = [];
                mediaRec.ondataavailable = e => audioChunks.push(e.data);
                mediaRec.onstop = async () => {
                    if(audioChunks.length === 0) return;
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const cid = [user, activeId].sort().join('_');
                        await db.collection('messages').add({ chatId: cid, text: '', data: reader.result, type: 'voice', s: user, t: firebase.firestore.FieldValue.serverTimestamp() });
                    };
                    reader.readAsDataURL(audioBlob);
                };
                mediaRec.start(); document.getElementById('voice-rec').classList.remove('hidden');
                secs = 0; timerInt = setInterval(() => { secs++; let m=Math.floor(secs/60).toString().padStart(2,'0'), s=(secs%60).toString().padStart(2,'0'); document.getElementById('timer').innerText=`${m}:${s}`; }, 1000);
            } catch(e) { alert("افتح المايك!"); }
        }
        function stopVoice(send) {
            clearInterval(timerInt); document.getElementById('voice-rec').classList.add('hidden');
            if(!send) audioChunks = [];
            if(mediaRec) mediaRec.stop();
        }

        function closeChat() { document.getElementById('chat-page').classList.add('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }
        async function startNewChat() { let p = prompt("أدخل رقم الهاتف:"); if(p) { if(p.startsWith('0')) p = p.substring(1); p = "+20"+p; openChat(p); } }
    </script>
</body>
</html>
