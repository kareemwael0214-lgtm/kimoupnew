<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kimoup - Official App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kimo: { main: '#0ea5e9', dark: '#0284c7', bg: '#f8fafc', text: '#1e293b' }
                    },
                    fontFamily: { sans: ['Cairo', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: #e2e8f0; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .app-container { width: 100%; height: 100%; background: #ffffff; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        @media (min-width: 768px) { .app-container { width: 420px; height: 850px; border-radius: 2.5rem; border: 8px solid #1e293b; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); } }

        #messages-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 15px; gap: 8px; background-color: #f0f2f5; scroll-behavior: smooth; }
        .msg-bubble { max-width: 80%; padding: 8px 12px; font-weight: 600; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-out { background-color: #dcf8c6; border-radius: 12px 12px 0 12px; align-self: flex-end; }
        .msg-in { background-color: #ffffff; border-radius: 12px 12px 12px 0; align-self: flex-start; }

        ::-webkit-scrollbar { width: 0px; }
        .hidden-view { display: none !important; }
        audio { height: 35px; width: 220px; outline: none; }
    </style>
</head>
<body>

    <div id="splash-screen" class="fixed inset-0 bg-white z-[999] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-24 h-24 bg-slate-900 rounded-full flex items-center justify-center shadow-xl animate-pulse mb-4 relative overflow-hidden">
            <i class="fas fa-bolt text-5xl text-sky-400"></i>
        </div>
        <h1 class="text-3xl font-black text-slate-800">Kimoup</h1>
        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">we here to help you</p>
    </div>

    <div class="app-container">

        <!-- 1. شاشة الدخول المباشر -->
        <div id="auth-view" class="absolute inset-0 bg-white z-[100] flex flex-col items-center justify-center p-8 hidden-view">
            <div class="w-full max-w-sm text-center">
                <div class="w-20 h-20 bg-slate-900 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
                    <i class="fas fa-bolt text-4xl text-sky-400"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-800 mb-1">Kimoup</h2>
                <p class="text-gray-400 text-sm mb-8 font-bold">تسجيل الدخول برقم الهاتف</p>

                <!-- خطوة فحص الرقم -->
                <div id="check-step" class="space-y-4">
                    <div class="bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 flex items-center focus-within:border-sky-500 transition-all">
                        <span class="text-gray-400 font-bold ml-3 border-l pl-3">+20</span>
                        <input type="tel" id="phone-input" placeholder="1112215950" class="w-full bg-transparent outline-none font-bold text-lg dir-ltr text-right">
                    </div>
                    <button onclick="checkNumberReady()" id="btn-check" class="w-full bg-sky-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">متابعة</button>
                </div>

                <!-- خطوة كود الدخول المباشر -->
                <div id="pin-step" class="hidden-view space-y-4">
                    <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto"><i class="fas fa-unlock-keyhole text-2xl"></i></div>
                    <h3 class="font-bold text-lg">أدخل كود الدخول</h3>
                    <p class="text-xs text-gray-400 mb-2">الكود الافتراضي هو 000000</p>
                    <input type="password" id="pin-input" placeholder="••••••" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold text-center text-2xl tracking-[0.3em] focus:border-green-500 border-2 border-transparent">
                    <button onclick="verifyAccess()" class="w-full bg-green-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">دخول</button>
                </div>
            </div>
        </div>

        <!-- 2. الواجهة الرئيسية -->
        <div id="main-view" class="w-full h-full flex flex-col hidden-view bg-white">
            
            <div class="h-[70px] bg-white flex items-center justify-between px-4 shrink-0 shadow-[0_2px_10px_rgba(0,0,0,0.05)] z-20">
                <div class="flex items-center gap-3">
                    <button id="logout-btn" onclick="logout()" class="hidden-view text-red-400 text-xl p-2 active:scale-90"><i class="fas fa-power-off"></i></button>
                    <button id="admin-panel-btn" onclick="openAdminModal()" class="hidden-view text-gray-400 hover:text-slate-800 text-xl p-2 active:scale-90"><i class="fas fa-user-shield"></i></button>
                    <button onclick="openSettingsModal()" class="text-yellow-500 text-xl p-2 active:scale-90"><i class="fas fa-id-card"></i></button>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <h1 class="font-black text-lg text-slate-800 leading-none tracking-wide">Kimoup</h1>
                        <p class="text-[8px] text-gray-400 font-bold tracking-widest lowercase">we here to help you</p>
                    </div>
                    <div class="w-10 h-10 bg-slate-900 rounded-full flex items-center justify-center shadow-md border-2 border-yellow-400">
                        <i class="fas fa-bolt text-sky-400 text-xl"></i>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-4 py-4 space-y-4">
                <button onclick="openAddFriendModal()" class="w-full py-3.5 bg-gray-50 border border-gray-200 rounded-2xl flex justify-center items-center gap-2 text-slate-700 font-bold shadow-sm active:scale-95 transition">
                    <i class="fas fa-user-plus text-sky-500 text-lg"></i> إضافة صديق
                </button>
                <div id="contacts-list" class="space-y-1 mt-4"></div>
            </div>
        </div>

        <!-- 3. شاشة الشات -->
        <div id="chat-view" class="absolute inset-0 bg-[#f0f2f5] z-[60] flex flex-col hidden-view animate-fade-in">
            <div class="h-[70px] bg-white flex items-center justify-between px-4 shrink-0 shadow-sm z-20">
                <button onclick="closeChat()" class="p-2 text-gray-500 active:scale-125 transition"><i class="fas fa-arrow-left text-xl"></i></button>
                <div class="flex-1 flex flex-col items-end justify-center mr-3">
                    <div class="flex items-center gap-1">
                        <i id="active-chat-verified" class="fas fa-check-circle text-sky-500 hidden-view text-[10px]"></i>
                        <h3 id="active-chat-name" class="font-bold text-sm text-slate-800"></h3>
                    </div>
                    <p id="active-chat-status" class="text-[10px] text-sky-500 font-bold"></p>
                </div>
                <div class="w-10 h-10 bg-slate-900 rounded-full flex items-center justify-center shadow-sm relative">
                    <img id="active-chat-img" src="" class="w-full h-full rounded-full object-cover">
                </div>
            </div>
            
            <div id="messages-container"><div id="msg-wrapper" class="flex flex-col gap-2"></div></div>
            
            <div class="p-2 bg-[#f0f2f5] flex gap-2 items-center z-30 mb-2 px-3">
                <button id="btn-voice" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart="startVoice(event)" ontouchend="stopVoice(event)" class="w-11 h-11 bg-sky-500 text-white rounded-full flex items-center justify-center shadow-md active:scale-90 transition">
                    <i class="fas fa-microphone text-lg"></i>
                </button>
                <div class="flex-1 bg-white rounded-full px-4 py-2.5 flex items-center shadow-sm">
                    <input type="text" id="m-input" placeholder="اكتب رسالة..." class="w-full bg-transparent outline-none font-semibold text-sm">
                    <button class="text-gray-400 ml-2"><i class="fas fa-paperclip text-lg"></i></button>
                </div>
                <button onclick="sendText()" class="w-11 h-11 text-sky-500 bg-white rounded-full flex items-center justify-center shadow-sm active:scale-90 transition">
                    <i class="fas fa-paper-plane text-xl rotate-[225deg]"></i>
                </button>
            </div>
            <div id="rec-toast" class="hidden-view absolute bottom-24 left-1/2 -translate-x-1/2 bg-red-500 text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-xl animate-pulse">جاري التسجيل...</div>
        </div>

        <!-- ================= Modals ================= -->
        
        <!-- إضافة صديق -->
        <div id="add-friend-modal" class="hidden-view fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-sm rounded-3xl p-6 text-center shadow-2xl relative mt-8 animate-slide-up">
                <div class="w-16 h-16 bg-sky-500 rounded-full text-white flex items-center justify-center mx-auto -mt-14 border-[5px] border-white shadow-md text-2xl font-bold">
                    <i class="fas fa-user-plus"></i>
                </div>
                <input type="tel" id="add-phone-input" placeholder="رقم الموبايل..." class="w-full p-4 mt-6 bg-gray-50 rounded-2xl outline-none font-bold text-center border border-gray-100">
                <div class="flex gap-3 mt-6">
                    <button onclick="closeAddFriendModal()" class="flex-1 py-3 bg-gray-100 text-gray-500 font-bold rounded-xl active:scale-95">إلغاء</button>
                    <button onclick="confirmAddFriend()" class="flex-1 py-3 bg-sky-500 text-white font-bold rounded-xl active:scale-95 shadow-md">إضافة</button>
                </div>
            </div>
        </div>

        <!-- إعدادات الحساب -->
        <div id="settings-modal" class="hidden-view fixed inset-0 bg-gray-50 z-[100] flex flex-col animate-slide-up">
            <div class="bg-sky-500 h-[65px] flex items-center justify-between px-4 text-white relative shadow-md shrink-0">
                <div class="w-8"></div>
                <h3 class="font-bold text-lg">إعدادات الحساب</h3>
                <button onclick="closeSettingsModal()" class="p-2 text-white active:scale-90"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div class="relative flex justify-center -mt-10 mb-4 shrink-0">
                <div class="relative w-[85px] h-[85px] bg-slate-900 rounded-full border-[4px] border-white shadow-lg flex items-center justify-center overflow-hidden">
                    <img id="set-img-preview" src="" class="w-full h-full object-cover">
                    <label class="absolute bottom-0 right-0 bg-sky-500 w-7 h-7 rounded-full flex items-center justify-center border-2 border-white text-white cursor-pointer z-10">
                        <i class="fas fa-camera text-[10px]"></i><input type="file" id="set-photo-input" class="hidden" accept="image/*">
                    </label>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-5 pb-6 space-y-4">
                <div class="bg-white border border-gray-200 rounded-2xl p-4 shadow-sm">
                    <p class="text-[10px] text-gray-400 font-bold mb-2 text-right">تغيير كود الدخول (Password):</p>
                    <input type="text" id="set-pass" placeholder="تغيير كود ال 000000" class="w-full p-3 bg-gray-50 rounded-xl outline-none font-bold text-center border border-gray-100">
                </div>

                <div class="bg-white border border-gray-200 rounded-2xl p-4 space-y-3 shadow-sm">
                    <input type="text" id="set-name" placeholder="اسمك" class="w-full p-3 bg-gray-50 rounded-xl outline-none font-bold text-right text-sm border border-gray-100">
                    <input type="text" id="set-bio" placeholder="الحالة" class="w-full p-3 bg-gray-50 rounded-xl outline-none font-bold text-right text-sm border border-gray-100">
                </div>

                <div class="bg-yellow-50 border border-yellow-200 rounded-2xl p-4 text-right shadow-sm">
                    <p class="text-[11px] text-yellow-700 font-bold mb-2">رد الأدمن التلقائي:</p>
                    <textarea id="set-auto-reply" rows="2" class="w-full p-2 bg-white rounded-xl outline-none text-xs font-bold border border-yellow-100"></textarea>
                </div>

                <div class="bg-white border border-gray-200 rounded-2xl p-4 flex items-center justify-end gap-3 shadow-sm">
                    <p class="font-bold text-sm text-gray-700">حساب تجاري</p>
                    <input type="checkbox" id="set-business" class="w-5 h-5 accent-sky-500 rounded">
                </div>

                <button onclick="requestVerification()" class="w-full py-3 bg-blue-50 text-blue-600 font-bold rounded-2xl border border-blue-100 shadow-sm active:scale-95 transition">طلب توثيق الحساب ✓</button>
                <button onclick="saveProfile()" class="w-full py-4 bg-sky-500 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition mt-2">حفظ التعديلات</button>
            </div>
        </div>

        <!-- لوحة التحكم بالتوثيقات للأدمن -->
        <div id="admin-modal" class="hidden-view fixed inset-0 bg-black/50 z-[110] flex items-center justify-center p-4">
            <div class="bg-[#1e2330] w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl flex flex-col">
                <div class="p-4 text-white flex justify-between items-center border-b border-gray-700">
                    <button onclick="closeAdminModal()"><i class="fas fa-times text-lg"></i></button>
                    <h3 class="font-bold text-lg">إدارة التوثيق 🔵</h3>
                </div>
                <div class="p-6 bg-white min-h-[40vh] max-h-[60vh] overflow-y-auto space-y-3" id="admin-requests">
                </div>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBS3GcNh5ltgwUqSClSTUoRNgdJiTOf0RM",
            authDomain: "whatsapp-fcd3c.firebaseapp.com",
            projectId: "whatsapp-fcd3c",
            storageBucket: "whatsapp-fcd3c.firebasestorage.app",
            messagingSenderId: "369090984748",
            appId: "1:369090984748:web:cba013025b108578cd0a89"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const ADMIN_PHONE = "+201112215950";
        let currentUser = localStorage.getItem('kimo_u_phone'); 
        let activeChatId = null, uCache = {}, tempPhone = "";
        let mediaRec, audioChunks = [], profileBase64 = '';

        setTimeout(() => {
            document.getElementById('splash-screen').classList.add('opacity-0');
            setTimeout(() => { 
                document.getElementById('splash-screen').classList.add('hidden-view'); 
                if(currentUser) initApp(); else document.getElementById('auth-view').classList.remove('hidden-view');
            }, 500);
        }, 1500);

        // --- 1. Login Logic (مباشر بدون انتظار) ---
        async function checkNumberReady() {
            let p = document.getElementById('phone-input').value.trim();
            if(!p) return alert("أدخل رقم الهاتف!");
            if(p.startsWith('0')) p = p.substring(1);
            tempPhone = "+20" + p;

            document.getElementById('btn-check').innerText = "جاري الفحص...";
            const userRef = db.collection('users').doc(tempPhone);
            const doc = await userRef.get();

            if(!doc.exists) {
                // إنشاء مستخدم وموافق عليه فوراً
                await userRef.set({
                    phone: tempPhone, displayName: "مستخدم " + tempPhone.slice(-4), bio: 'اهلا بكم',
                    status: 'approved', loginCode: '000000', isVerified: tempPhone === ADMIN_PHONE,
                    contacts: [], createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            } else if (doc.data().status === 'pending') {
                // لو كان في حد قديم متعلق في المراجعة، وافق عليه فوراً
                await userRef.update({ status: 'approved' });
            }
            
            showStep('pin-step');
            document.getElementById('btn-check').innerText = "متابعة";
        }

        function showStep(id) {
            ['check-step', 'pin-step'].forEach(i => document.getElementById(i).classList.add('hidden-view'));
            document.getElementById(id).classList.remove('hidden-view');
        }

        async function verifyAccess() {
            const pin = document.getElementById('pin-input').value.trim();
            const snap = await db.collection('users').doc(tempPhone).get();
            if (snap.data().loginCode === pin || pin === '000000') {
                currentUser = tempPhone;
                localStorage.setItem('kimo_u_phone', currentUser);
                initApp();
            } else alert("الباسورد خطأ!");
        }

        // --- 2. Main App Logic ---
        function initApp() {
            document.getElementById('auth-view').classList.add('hidden-view');
            document.getElementById('main-view').classList.remove('hidden-view');

            // قفل الجهاز
            if (currentUser === ADMIN_PHONE) {
                document.getElementById('logout-btn').classList.remove('hidden-view');
                document.getElementById('admin-panel-btn').classList.remove('hidden-view');
            }

            db.collection('users').doc(currentUser).onSnapshot(s => {
                if(!s.exists) return;
                const me = s.data();
                profileBase64 = me.avatar || `https://ui-avatars.com/api/?name=${me.displayName}&background=0ea5e9&color=fff`;
                document.getElementById('set-img-preview').src = profileBase64;
                document.getElementById('set-name').value = me.displayName;
                document.getElementById('set-bio').value = me.bio || 'اهلا بكم';
                document.getElementById('set-auto-reply').value = me.autoReply || '';
                document.getElementById('set-business').checked = me.isBusiness || false;
            });

            db.collection('users').onSnapshot(s => { s.docs.forEach(d => uCache[d.id] = d.data()); renderContacts(); });
        }

        function renderContacts() {
            const list = document.getElementById('contacts-list'); list.innerHTML = '';
            Object.values(uCache).forEach(u => {
                if(u.phone === currentUser) return;
                list.innerHTML += `
                    <div onclick="openChat('${u.phone}')" class="flex flex-row-reverse items-center gap-3 cursor-pointer p-2 active:bg-gray-50 rounded-xl transition">
                        <div class="w-[50px] h-[50px] bg-sky-500 rounded-full shrink-0 flex items-center justify-center text-white font-bold text-xl overflow-hidden shadow-sm">
                            ${u.avatar ? `<img src="${u.avatar}" class="w-full h-full object-cover">` : u.displayName.substring(0,2)}
                        </div>
                        <div class="text-right flex-1">
                            <div class="flex items-center justify-end gap-1">
                                ${u.isVerified ? '<i class="fas fa-check-circle text-sky-500 text-[10px]"></i>' : ''}
                                <h3 class="font-bold text-[15px] text-slate-800">${u.displayName}</h3>
                            </div>
                            <p class="text-[11px] text-gray-400 mt-0.5">${u.bio || 'متاح في كيمو اب'}</p>
                        </div>
                    </div>
                    <div class="w-[80%] mx-auto border-b border-gray-100 my-1"></div>`;
            });
        }

        // --- 3. Chat Logic ---
        function openChat(id) {
            activeChatId = id;
            const u = uCache[id];
            document.getElementById('chat-view').classList.remove('hidden-view');
            document.getElementById('active-chat-name').innerText = u.displayName;
            document.getElementById('active-chat-status').innerText = u.bio || 'اهلا بكم';
            document.getElementById('active-chat-verified').classList.toggle('hidden-view', !u.isVerified);
            document.getElementById('active-chat-img').src = u.avatar || `https://ui-avatars.com/api/?name=${u.displayName}`;
            loadMsgs();
        }

        function loadMsgs() {
            const cid = [currentUser, activeChatId].sort().join('_');
            const cont = document.getElementById('messages-container'), wrap = document.getElementById('msg-wrapper');
            db.collection('chats').doc(cid).collection('messages').onSnapshot(s => {
                let msgs = []; s.forEach(d => msgs.push(d.data()));
                msgs.sort((a,b) => (a.t?.toMillis() || 0) - (b.t?.toMillis() || 0));
                wrap.innerHTML = '';
                msgs.forEach(m => {
                    const isMe = m.s === currentUser;
                    let content = m.type === 'voice' ? `<audio controls src="${m.data}"></audio>` : `<p>${m.txt}</p>`;
                    wrap.insertAdjacentHTML('beforeend', `<div class="flex flex-col ${isMe?'items-end':'items-start'} w-full"><div class="msg-bubble ${isMe?'msg-out':'msg-in'}">${content}</div></div>`);
                });
                cont.scrollTop = cont.scrollHeight;
            });
        }

        async function sendText() {
            const i = document.getElementById('m-input'), txt = i.value.trim(); if(!txt) return;
            const cid = [currentUser, activeChatId].sort().join('_'); i.value = '';
            await db.collection('chats').doc(cid).collection('messages').add({ s: currentUser, txt, type: 'text', t: firebase.firestore.FieldValue.serverTimestamp() });
        }

        // Voice
        async function startVoice(e) {
            if(e) e.preventDefault();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRec = new MediaRecorder(stream); audioChunks = [];
                mediaRec.ondataavailable = ev => audioChunks.push(ev.data);
                mediaRec.onstop = async () => {
                    if(audioChunks.length === 0) return;
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const cid = [currentUser, activeChatId].sort().join('_');
                        await db.collection('chats').doc(cid).collection('messages').add({ s: currentUser, data: reader.result, type: 'voice', t: firebase.firestore.FieldValue.serverTimestamp() });
                    };
                    reader.readAsDataURL(audioBlob);
                };
                mediaRec.start();
                document.getElementById('rec-toast').classList.remove('hidden-view');
            } catch(err) { alert("اسمح بالمايك!"); }
        }
        function stopVoice(e) {
            if(e) e.preventDefault();
            if(mediaRec && mediaRec.state !== 'inactive') {
                mediaRec.stop();
                document.getElementById('rec-toast').classList.add('hidden-view');
                mediaRec.stream.getTracks().forEach(t => t.stop());
            }
        }

        // --- 4. Modals ---
        function openAddFriendModal() { document.getElementById('add-friend-modal').classList.remove('hidden-view'); }
        function closeAddFriendModal() { document.getElementById('add-friend-modal').classList.add('hidden-view'); }
        async function confirmAddFriend() {
            let p = document.getElementById('add-phone-input').value.trim();
            if(!p) return;
            if(p.startsWith('0')) p = p.substring(1); p = "+20"+p;
            
            const doc = await db.collection('users').doc(p).get();
            if(doc.exists) {
                closeAddFriendModal();
                openChat(p);
            } else alert("الرقم ده لسه مسجلش في الأبلكيشن!");
        }

        function openSettingsModal() { document.getElementById('settings-modal').classList.remove('hidden-view'); }
        function closeSettingsModal() { document.getElementById('settings-modal').classList.add('hidden-view'); }
        
        document.getElementById('set-photo-input').onchange = e => {
            const f = e.target.files[0]; if(f) { const r = new FileReader(); r.onload = ev => { profileBase64 = ev.target.result; document.getElementById('set-img-preview').src = profileBase64; }; r.readAsDataURL(f); }
        };

        async function saveProfile() {
            const name = document.getElementById('set-name').value.trim();
            const bio = document.getElementById('set-bio').value.trim();
            const pass = document.getElementById('set-pass').value.trim();
            const autoReply = document.getElementById('set-auto-reply').value.trim();
            const isBusiness = document.getElementById('set-business').checked;
            
            if(!name) return alert('الاسم مطلوب!');
            let updates = { displayName: name, bio, autoReply, isBusiness, avatar: profileBase64 };
            if(pass && pass.length >= 4) updates.loginCode = pass;
            
            await db.collection('users').doc(currentUser).update(updates);
            alert("تم الحفظ بنجاح");
            closeSettingsModal();
        }

        function requestVerification() { alert("تم إرسال طلب التوثيق للإدارة."); }

        // لوحة الأدمن للتوثيق فقط
        function openAdminModal() {
            document.getElementById('admin-modal').classList.remove('hidden-view');
            const list = document.getElementById('admin-requests');
            db.collection('users').onSnapshot(snap => {
                list.innerHTML = '';
                let hasUsers = false;
                snap.forEach(doc => {
                    const u = doc.data();
                    if(u.phone === ADMIN_PHONE) return; 
                    hasUsers = true;
                    
                    const btn = u.isVerified 
                        ? `<button onclick="updateVerify('${u.phone}', false)" class="bg-red-100 text-red-600 px-3 py-1.5 rounded text-xs font-bold shadow-sm">إزالة التوثيق</button>`
                        : `<button onclick="updateVerify('${u.phone}', true)" class="bg-sky-500 text-white px-3 py-1.5 rounded text-xs font-bold shadow-sm">توثيق 🔵</button>`;

                    list.innerHTML += `
                        <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 flex justify-between items-center shadow-sm">
                            <div class="text-right flex-1 ml-2">
                                <p class="font-bold text-[13px] text-slate-800">${u.displayName} ${u.isVerified ? '<i class="fas fa-check-circle text-sky-500"></i>' : ''}</p>
                                <p class="text-[10px] text-gray-500">${u.phone}</p>
                            </div>
                            <div>${btn}</div>
                        </div>`;
                });
                if(!hasUsers) list.innerHTML = '<p class="text-center text-gray-400 font-bold mt-10">لا يوجد مستخدمين.</p>';
            });
        }
        async function updateVerify(phone, isVerified) { await db.collection('users').doc(phone).update({ isVerified }); }
        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden-view'); }
        
        function closeChat() { document.getElementById('chat-view').classList.add('hidden-view'); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
