<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kimoup - Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kimo: { main: '#0ea5e9', dark: '#0284c7', bg: '#f8fafc', text: '#1e293b' }
                    },
                    fontFamily: { sans: ['Cairo', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: #e2e8f0; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .app-container { width: 100%; height: 100%; background: #ffffff; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        @media (min-width: 768px) { .app-container { width: 420px; height: 850px; border-radius: 2.5rem; border: 8px solid #1e293b; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); } }

        /* ستايل الشات */
        #messages-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 15px; gap: 8px; scroll-behavior: smooth; background-color: #f0f2f5; }
        .msg-bubble { max-width: 80%; padding: 8px 12px; font-weight: 600; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-out { background-color: #dcf8c6; border-radius: 12px 12px 0 12px; align-self: flex-end; }
        .msg-in { background-color: #ffffff; border-radius: 12px 12px 12px 0; align-self: flex-start; }

        /* إخفاء سكرول بار */
        ::-webkit-scrollbar { width: 0px; }
        .hidden-view { display: none !important; }
        audio { height: 35px; width: 220px; outline: none; }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen" class="fixed inset-0 bg-white z-[999] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-24 h-24 bg-slate-900 rounded-full flex items-center justify-center shadow-xl animate-pulse mb-4">
            <i class="fas fa-bolt text-5xl text-sky-400"></i>
        </div>
        <h1 class="text-3xl font-black text-slate-800">Kimoup</h1>
    </div>

    <div class="app-container">

        <!-- ================= 1. شاشة الدخول (Gmail) ================= -->
        <div id="auth-view" class="absolute inset-0 bg-white z-[100] flex flex-col items-center justify-center p-8 hidden-view">
            <div class="w-full max-w-sm text-center">
                <div class="w-20 h-20 bg-slate-900 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
                    <i class="fas fa-bolt text-4xl text-sky-400"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-800 mb-1">Kimoup</h2>
                <p id="auth-title" class="text-gray-400 text-sm mb-8 font-bold">تسجيل الدخول</p>

                <!-- فورم التسجيل (مخفي في الدخول) -->
                <div id="signup-fields" class="space-y-4 mb-4 hidden-view">
                    <div class="relative w-20 h-20 mx-auto">
                        <img id="avatar-preview" src="https://ui-avatars.com/api/?name=U&background=0ea5e9&color=fff" class="w-full h-full rounded-full object-cover border-2 border-gray-200">
                        <label class="absolute bottom-0 right-0 bg-sky-500 text-white w-7 h-7 rounded-full flex items-center justify-center border-2 border-white cursor-pointer shadow-md">
                            <i class="fas fa-camera text-[10px]"></i>
                            <input type="file" id="photo-input" class="hidden" accept="image/*">
                        </label>
                    </div>
                    <input type="text" id="name-input" placeholder="اسمك بالكامل" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold focus:ring-2 ring-sky-500">
                </div>

                <div class="space-y-4">
                    <input type="email" id="email-input" placeholder="الإيميل (Gmail)" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold focus:ring-2 ring-sky-500">
                    <input type="password" id="pass-input" placeholder="كلمة المرور" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold focus:ring-2 ring-sky-500">
                    <button onclick="handleAuth()" id="auth-btn" class="w-full bg-sky-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">دخول</button>
                    <p onclick="toggleAuthMode()" id="toggle-link" class="text-sm text-sky-600 font-bold mt-4 cursor-pointer">إنشاء حساب جديد</p>
                </div>
            </div>
        </div>

        <!-- ================= 2. الواجهة الرئيسية (نفس الشكل القديم) ================= -->
        <div id="main-view" class="w-full h-full flex flex-col hidden-view bg-white">
            
            <!-- الهيدر الأبيض -->
            <div class="h-[70px] bg-white flex items-center justify-between px-4 shrink-0 shadow-[0_2px_10px_rgba(0,0,0,0.05)] z-20">
                <div class="flex items-center gap-3">
                    <button id="logout-btn" onclick="logout()" class="hidden-view text-red-400 text-xl p-2 active:scale-90"><i class="fas fa-power-off"></i></button>
                    <button onclick="openSettingsModal()" class="text-gray-400 text-xl p-2 active:scale-90"><i class="fas fa-id-card"></i></button>
                    <button id="admin-panel-btn" onclick="openAdminModal()" class="hidden-view text-yellow-500 text-xl p-2 active:scale-90"><i class="fas fa-user-shield"></i></button>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <h1 class="font-black text-lg text-slate-800 leading-none">Kimoup</h1>
                        <p class="text-[8px] text-gray-400 font-bold tracking-widest uppercase">we here to help you</p>
                    </div>
                    <div class="w-10 h-10 bg-slate-900 rounded-full flex items-center justify-center shadow-md">
                        <i class="fas fa-bolt text-sky-400 text-xl"></i>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-4 py-4 space-y-4">
                <!-- زر إضافة صديق -->
                <button onclick="openAddFriendModal()" class="w-full py-3 bg-gray-50/80 border border-gray-200 rounded-2xl flex justify-center items-center gap-2 text-slate-700 font-bold shadow-sm active:scale-95 transition">
                    إضافة صديق <i class="fas fa-user-plus text-sky-500"></i>
                </button>

                <!-- قائمة الأصدقاء -->
                <div id="contacts-list" class="space-y-4 mt-4"></div>
            </div>
        </div>

        <!-- ================= 3. شاشة الشات ================= -->
        <div id="chat-view" class="absolute inset-0 bg-[#efeae2] z-[60] flex flex-col hidden-view">
            <!-- هيدر الشات -->
            <div class="h-[70px] bg-white flex items-center justify-between px-4 shrink-0 shadow-sm z-20">
                <button onclick="closeChat()" class="p-2 text-gray-500 active:scale-125 transition"><i class="fas fa-arrow-left text-xl"></i></button>
                
                <div class="flex-1 flex flex-col items-center justify-center">
                    <div class="flex items-center gap-1">
                        <h3 id="active-chat-name" class="font-bold text-sm text-slate-800"></h3>
                        <i id="active-chat-verified" class="fas fa-check-circle text-sky-500 hidden-view text-[10px]"></i>
                    </div>
                    <p id="active-chat-status" class="text-[10px] text-sky-500 font-bold"></p>
                </div>

                <div class="w-10 h-10 bg-slate-900 rounded-full flex items-center justify-center shadow-sm">
                    <i class="fas fa-bolt text-sky-400"></i>
                </div>
            </div>
            
            <div id="messages-container"><div id="msg-wrapper" class="flex flex-col gap-2"></div></div>
            
            <!-- إدخال الرسائل -->
            <div class="p-2 bg-[#f0f2f5] flex gap-2 items-center z-30">
                <button id="btn-voice" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart="startVoice(event)" ontouchend="stopVoice(event)" class="w-10 h-10 bg-sky-500 text-white rounded-full flex items-center justify-center shadow-md active:scale-90 transition">
                    <i class="fas fa-microphone"></i>
                </button>
                <div class="flex-1 bg-white rounded-full px-4 py-2 flex items-center shadow-sm">
                    <input type="text" id="m-input" placeholder="اكتب رسالة..." class="w-full bg-transparent outline-none font-semibold text-sm">
                    <button class="text-gray-400 ml-2"><i class="fas fa-paperclip"></i></button>
                </div>
                <button onclick="sendText()" class="w-10 h-10 text-sky-500 rounded-full flex items-center justify-center active:scale-90 transition">
                    <i class="fas fa-paper-plane text-xl"></i>
                </button>
            </div>
            <div id="rec-toast" class="hidden-view absolute bottom-20 left-1/2 -translate-x-1/2 bg-red-500 text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-xl animate-pulse">جاري التسجيل...</div>
        </div>

        <!-- ================= Modals (إضافات، إعدادات، أدمن) ================= -->
        
        <!-- إضافة صديق -->
        <div id="add-friend-modal" class="hidden-view fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-sm rounded-3xl p-6 text-center shadow-2xl relative mt-8">
                <div class="w-16 h-16 bg-sky-500 rounded-full text-white flex items-center justify-center mx-auto -mt-12 border-4 border-white shadow-md text-2xl font-bold">
                    <i class="fas fa-user-plus"></i>
                </div>
                <input type="email" id="add-email-input" placeholder="إيميل الصديق..." class="w-full p-4 mt-6 bg-gray-50 rounded-2xl outline-none font-bold text-center border border-gray-100">
                <div class="flex gap-3 mt-6">
                    <button onclick="closeAddFriendModal()" class="flex-1 py-3 bg-gray-100 text-gray-500 font-bold rounded-xl active:scale-95">إلغاء</button>
                    <button onclick="confirmAddFriend()" class="flex-1 py-3 bg-sky-500 text-white font-bold rounded-xl active:scale-95 shadow-md">إضافة</button>
                </div>
            </div>
        </div>

        <!-- إعدادات الحساب (مطابقة للصورة 1000083301) -->
        <div id="settings-modal" class="hidden-view fixed inset-0 bg-white z-[100] flex flex-col">
            <div class="bg-sky-500 h-[60px] flex items-center justify-between px-4 text-white relative shadow-md shrink-0">
                <div class="w-8"></div> <!-- Spacer -->
                <h3 class="font-bold text-lg">إعدادات الحساب</h3>
                <button onclick="closeSettingsModal()" class="p-2 text-white active:scale-90"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div class="relative flex justify-center -mt-10 mb-4 shrink-0">
                <div class="relative w-24 h-24 bg-slate-900 rounded-full border-[5px] border-white shadow-lg flex items-center justify-center overflow-hidden">
                    <img id="set-img-preview" src="" class="w-full h-full object-cover">
                    <label class="absolute bottom-0 right-0 bg-sky-500 w-8 h-8 rounded-full flex items-center justify-center border-2 border-white text-white cursor-pointer z-10">
                        <i class="fas fa-camera text-xs"></i><input type="file" id="set-photo-input" class="hidden" accept="image/*">
                    </label>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-6 pb-6 space-y-4">
                <div class="border border-gray-200 rounded-2xl p-4">
                    <p class="text-[10px] text-gray-400 font-bold mb-2">تغيير الباسورد</p>
                    <input type="text" id="set-pass" placeholder="الباسورد الجديد" class="w-full p-2 bg-gray-50 rounded-xl outline-none font-bold text-center">
                </div>

                <div class="border border-gray-200 rounded-2xl p-4 space-y-3">
                    <input type="text" id="set-name" placeholder="اسمك" class="w-full p-3 bg-gray-50 rounded-xl outline-none font-bold text-right text-sm border border-gray-100">
                    <input type="text" id="set-bio" placeholder="الحالة" class="w-full p-3 bg-gray-50 rounded-xl outline-none font-bold text-right text-sm border border-gray-100">
                </div>

                <!-- صندوق معلومات الأدمن التلقائي (شكل جمالي/ميزة) -->
                <div class="bg-yellow-50/50 border border-yellow-200 rounded-2xl p-4 text-right">
                    <p class="text-[11px] text-yellow-700 font-bold mb-2">معلومات الحساب:</p>
                    <p id="set-email-display" class="text-xs text-gray-600 font-bold" dir="ltr"></p>
                    <p id="set-role-display" class="text-xs text-sky-600 font-bold mt-1"></p>
                </div>

                <button onclick="saveProfile()" class="w-full py-4 bg-sky-500 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition mt-4">حفظ التعديلات</button>
            </div>
        </div>

        <!-- لوحة طلبات التوثيق والأدمن (مطابقة للصورة 1000083305) -->
        <div id="admin-modal" class="hidden-view fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl flex flex-col">
                <div class="bg-slate-900 p-4 text-white flex justify-between items-center">
                    <div class="w-6"></div>
                    <h3 class="font-bold">لوحة الإدارة والتوثيق</h3>
                    <button onclick="closeAdminModal()"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-6 max-h-[50vh] overflow-y-auto bg-gray-50 space-y-3" id="admin-requests">
                    <p class="text-center text-gray-400 font-bold">لا يوجد مستخدمين.</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBS3GcNh5ltgwUqSClSTUoRNgdJiTOf0RM",
            authDomain: "whatsapp-fcd3c.firebaseapp.com",
            projectId: "whatsapp-fcd3c",
            storageBucket: "whatsapp-fcd3c.firebasestorage.app",
            messagingSenderId: "369090984748",
            appId: "1:369090984748:web:cba013025b108578cd0a89"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(), auth = firebase.auth();

        const ADMIN_EMAIL = "kareemwael0213@gmail.com";
        let me = null, activeChatId = null, uCache = {}, isLogin = true;
        let mediaRec, audioChunks = [], profileBase64 = '';

        // Splash Hide
        setTimeout(() => {
            document.getElementById('splash-screen').classList.add('opacity-0');
            setTimeout(() => document.getElementById('splash-screen').classList.add('hidden-view'), 500);
        }, 1500);

        // --- 1. Auth Logic ---
        auth.onAuthStateChanged(async (u) => {
            if(u) {
                const doc = await db.collection('users').doc(u.uid).get();
                if(doc.exists) {
                    me = { uid: u.uid, ...doc.data() };
                    // تأكيد صلاحيات الأدمن
                    if(me.email === ADMIN_EMAIL && !me.isVerified) {
                        await db.collection('users').doc(u.uid).update({ isVerified: true, role: 'admin' });
                        me.isVerified = true;
                        me.role = 'admin';
                    }
                    startApp();
                }
            } else {
                document.getElementById('main-view').classList.add('hidden-view');
                document.getElementById('auth-view').classList.remove('hidden-view');
            }
        });

        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('signup-fields').classList.toggle('hidden-view', isLogin);
            document.getElementById('auth-title').innerText = isLogin ? 'تسجيل الدخول' : 'إنشاء حساب جديد';
            document.getElementById('auth-btn').innerText = isLogin ? 'دخول' : 'تسجيل';
            document.getElementById('toggle-link').innerText = isLogin ? 'إنشاء حساب جديد' : 'لدي حساب بالفعل';
        }

        async function handleAuth() {
            const email = document.getElementById('email-input').value.trim();
            const pass = document.getElementById('pass-input').value.trim();
            const name = document.getElementById('name-input').value.trim();
            const photo = document.getElementById('avatar-preview').src;

            if(!email || !pass) return alert("أدخل البيانات كاملة!");

            try {
                if(isLogin) {
                    await auth.signInWithEmailAndPassword(email, pass);
                } else {
                    if(!name) return alert("الاسم مطلوب!");
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    const userData = {
                        uid: res.user.uid, name, email, photo,
                        isVerified: email === ADMIN_EMAIL, role: email === ADMIN_EMAIL ? 'admin' : 'user',
                        contacts: [], createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    await db.collection('users').doc(res.user.uid).set(userData);
                }
            } catch(e) { alert("تأكد من صحة البيانات أو الإيميل مستخدم مسبقاً."); }
        }

        // --- 2. Main App Logic ---
        function startApp() {
            document.getElementById('auth-view').classList.add('hidden-view');
            document.getElementById('main-view').classList.remove('hidden-view');

            // قفل الجهاز (إظهار زر الخروج للأدمن فقط)
            if (me.email === ADMIN_EMAIL) {
                document.getElementById('logout-btn').classList.remove('hidden-view');
                document.getElementById('admin-panel-btn').classList.remove('hidden-view');
            }

            db.collection('users').onSnapshot(snap => {
                const list = document.getElementById('contacts-list');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const u = doc.data();
                    uCache[u.uid] = u;
                    if(u.uid !== me.uid && me.contacts?.includes(u.uid)) {
                        list.innerHTML += `
                            <div onclick="openChat('${u.uid}')" class="flex items-center justify-end gap-3 cursor-pointer p-2 active:bg-gray-50 rounded-xl transition">
                                <div class="text-right">
                                    <div class="flex items-center justify-end gap-1">
                                        ${u.isVerified ? '<i class="fas fa-check-circle text-sky-500 text-xs"></i>' : ''}
                                        <h3 class="font-bold text-sm text-slate-800">${u.name}</h3>
                                    </div>
                                    <p class="text-[10px] text-gray-400">${u.bio || 'متاح'}</p>
                                </div>
                                <div class="w-12 h-12 relative shrink-0">
                                    <img src="${u.photo}" class="w-full h-full rounded-full object-cover border border-gray-200 shadow-sm">
                                </div>
                            </div>
                            <div class="w-4/5 ml-auto border-b border-gray-100 my-1"></div>`;
                    }
                });
            });
        }

        // --- 3. Chat Logic ---
        function openChat(id) {
            activeChatId = id;
            const u = uCache[id];
            document.getElementById('chat-view').classList.remove('hidden-view');
            document.getElementById('active-chat-name').innerText = u.name;
            document.getElementById('active-chat-status').innerText = u.bio || 'متصل';
            document.getElementById('active-chat-verified').classList.toggle('hidden-view', !u.isVerified);
            loadMsgs();
        }

        function loadMsgs() {
            const cid = [me.uid, activeChatId].sort().join('_');
            const cont = document.getElementById('messages-container'), wrap = document.getElementById('msg-wrapper');
            db.collection('chats').doc(cid).collection('messages').onSnapshot(s => {
                let msgs = []; s.forEach(d => msgs.push(d.data()));
                msgs.sort((a,b) => (a.t?.toMillis() || 0) - (b.t?.toMillis() || 0));
                wrap.innerHTML = '';
                msgs.forEach(m => {
                    const isMe = m.s === me.uid;
                    let content = m.type === 'voice' ? `<audio controls src="${m.data}"></audio>` : `<p>${m.txt}</p>`;
                    wrap.insertAdjacentHTML('beforeend', `<div class="flex flex-col ${isMe?'items-end':'items-start'} w-full"><div class="msg-bubble ${isMe?'msg-out':'msg-in'}">${content}</div></div>`);
                });
                cont.scrollTop = cont.scrollHeight;
            });
        }

        async function sendText() {
            const i = document.getElementById('m-input'), txt = i.value.trim(); if(!txt) return;
            const cid = [me.uid, activeChatId].sort().join('_'); i.value = '';
            await db.collection('chats').doc(cid).collection('messages').add({ s: me.uid, txt, type: 'text', t: firebase.firestore.FieldValue.serverTimestamp() });
        }

        // --- 4. Voice Recording ---
        async function startVoice(e) {
            if(e) e.preventDefault();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRec = new MediaRecorder(stream); audioChunks = [];
                mediaRec.ondataavailable = ev => audioChunks.push(ev.data);
                mediaRec.onstop = async () => {
                    if(audioChunks.length === 0) return;
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const cid = [me.uid, activeChatId].sort().join('_');
                        await db.collection('chats').doc(cid).collection('messages').add({ s: me.uid, data: reader.result, type: 'voice', t: firebase.firestore.FieldValue.serverTimestamp() });
                    };
                    reader.readAsDataURL(audioBlob);
                };
                mediaRec.start();
                document.getElementById('rec-toast').classList.remove('hidden-view');
            } catch(err) { alert("اسمح باستخدام المايك!"); }
        }
        function stopVoice(e) {
            if(e) e.preventDefault();
            if(mediaRec && mediaRec.state !== 'inactive') {
                mediaRec.stop();
                document.getElementById('rec-toast').classList.add('hidden-view');
                mediaRec.stream.getTracks().forEach(t => t.stop());
            }
        }

        // --- 5. Modals & Settings ---
        function openAddFriendModal() { document.getElementById('add-friend-modal').classList.remove('hidden-view'); }
        function closeAddFriendModal() { document.getElementById('add-friend-modal').classList.add('hidden-view'); }
        
        async function confirmAddFriend() {
            const email = document.getElementById('add-email-input').value.trim();
            if(!email) return;
            const q = await db.collection('users').where('email', '==', email).get();
            if(!q.empty) {
                const friendId = q.docs[0].id;
                if(friendId !== me.uid) {
                    await db.collection('users').doc(me.uid).update({ contacts: firebase.firestore.FieldValue.arrayUnion(friendId) });
                    closeAddFriendModal();
                    openChat(friendId);
                }
            } else { alert("هذا الإيميل غير مسجل بالتطبيق!"); }
        }

        function openSettingsModal() {
            document.getElementById('settings-modal').classList.remove('hidden-view');
            document.getElementById('set-name').value = me.name;
            document.getElementById('set-bio').value = me.bio || '';
            document.getElementById('set-img-preview').src = me.photo;
            document.getElementById('set-email-display').innerText = me.email;
            document.getElementById('set-role-display').innerText = me.isVerified ? 'حساب موثق 🔵' : 'عضو عادي';
            profileBase64 = me.photo;
        }
        function closeSettingsModal() { document.getElementById('settings-modal').classList.add('hidden-view'); }
        
        document.getElementById('set-photo-input').onchange = e => {
            const f = e.target.files[0]; if(f) { const r = new FileReader(); r.onload = ev => { profileBase64 = ev.target.result; document.getElementById('set-img-preview').src = profileBase64; }; r.readAsDataURL(f); }
        };

        async function saveProfile() {
            const name = document.getElementById('set-name').value.trim(), bio = document.getElementById('set-bio').value.trim(), pass = document.getElementById('set-pass').value.trim();
            if(!name) return;
            await db.collection('users').doc(me.uid).update({ name, bio, photo: profileBase64 });
            if(pass && pass.length >= 6) {
                try { await auth.currentUser.updatePassword(pass); alert("تم تغيير الباسورد بنجاح!"); } catch(e) { alert("أعد تسجيل الدخول لتغيير الباسورد."); }
            }
            closeSettingsModal();
        }

        // --- 6. Admin Panel (التوثيق) ---
        function openAdminModal() {
            document.getElementById('admin-modal').classList.remove('hidden-view');
            const list = document.getElementById('admin-requests');
            db.collection('users').onSnapshot(snap => {
                list.innerHTML = '';
                snap.forEach(doc => {
                    const u = doc.data();
                    if(u.email === ADMIN_EMAIL) return; // Hide admin from list
                    const actionBtn = u.isVerified 
                        ? `<button onclick="toggleVerify('${u.uid}', false)" class="text-xs bg-red-100 text-red-600 px-3 py-1 rounded-lg font-bold">إلغاء التوثيق</button>`
                        : `<button onclick="toggleVerify('${u.uid}', true)" class="text-xs bg-sky-500 text-white px-3 py-1 rounded-lg font-bold">توثيق 🔵</button>`;
                    
                    list.innerHTML += `
                        <div class="bg-white p-3 rounded-xl border border-gray-100 flex justify-between items-center shadow-sm">
                            <div class="text-right">
                                <p class="font-bold text-xs text-slate-800">${u.name} ${u.isVerified ? '<i class="fas fa-check-circle text-sky-500"></i>' : ''}</p>
                                <p class="text-[9px] text-gray-400">${u.email}</p>
                            </div>
                            <div>${actionBtn}</div>
                        </div>`;
                });
            });
        }
        async function toggleVerify(uid, state) { await db.collection('users').doc(uid).update({ isVerified: state }); }
        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden-view'); }
        
        function closeChat() { document.getElementById('chat-view').classList.add('hidden-view'); }
        function logout() { auth.signOut(); location.reload(); }
    </script>
</body>
</html>
