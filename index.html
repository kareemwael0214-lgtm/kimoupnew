<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kimoup - Classic Stable</title>
    
    <!-- CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { kimo: { main: '#0ea5e9', dark: '#0284c7', bg: '#f0f2f5', text: '#1e293b' } },
                    fontFamily: { sans: ['Cairo', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; scrollbar-width: none; }
        body { background-color: #cbd5e1; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .app-container { width: 100%; height: 100%; background: #ffffff; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        @media (min-width: 768px) { .app-container { width: 420px; height: 850px; border-radius: 2.5rem; border: 10px solid #1e293b; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5); } }

        #messages-container, #spy-messages-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 15px; gap: 8px; background-color: #efeae2; scroll-behavior: smooth; }
        .msg-bubble { max-width: 85%; padding: 8px 14px; font-weight: 600; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); border-radius: 12px; }
        .msg-out { background-color: #dcf8c6; align-self: flex-end; border-top-right-radius: 2px; }
        .msg-in { background-color: #ffffff; align-self: flex-start; border-top-left-radius: 2px; }
        
        .verified-badge {
            background-color: #0ea5e9;
            color: white;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            margin-right: 4px;
            box-shadow: 0 0 0 1.5px white;
        }

        .hidden-view { display: none !important; }
        ::-webkit-scrollbar { display: none; }
        audio { height: 35px; width: 220px; outline: none; }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen" class="fixed inset-0 bg-white z-[999] flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="w-28 h-28 bg-slate-900 rounded-full flex items-center justify-center shadow-xl animate-pulse mb-4">
            <i class="fas fa-bolt text-6xl text-sky-400"></i>
        </div>
        <h1 class="text-3xl font-black text-slate-800">Kimoup</h1>
    </div>

    <!-- Alert Toast -->
    <div id="alert-toast" class="hidden-view fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-3 rounded-full text-sm font-bold shadow-2xl z-[9999] text-center w-5/6"></div>

    <div class="app-container">

        <!-- 1. شاشة الدخول -->
        <div id="auth-view" class="absolute inset-0 bg-white z-[100] flex flex-col items-center justify-center p-8 hidden-view">
            <div class="w-full max-w-sm text-center">
                <div class="w-20 h-20 bg-slate-900 rounded-[1.2rem] flex items-center justify-center mx-auto mb-6 shadow-lg"><i class="fas fa-bolt text-4xl text-sky-400"></i></div>
                <h2 class="text-2xl font-black text-slate-800 mb-2">تسجيل الدخول</h2>
                <p class="text-gray-400 text-sm mb-10 font-bold">أدخل رقمك للتحقق من هويتك</p>

                <div id="check-step" class="space-y-4">
                    <div class="bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 flex items-center focus-within:border-sky-500 transition-all">
                        <span class="text-gray-400 font-bold ml-3 border-l pl-3">+20</span>
                        <input type="tel" id="phone-input" placeholder="1112215950" class="w-full bg-transparent outline-none font-bold text-lg dir-ltr text-right">
                    </div>
                    <button onclick="checkNumberReady()" id="btn-check" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">متابعة</button>
                </div>

                <div id="pin-step" class="hidden-view space-y-6">
                    <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto"><i class="fas fa-unlock-keyhole text-2xl"></i></div>
                    <h3 class="font-bold text-xl">أدخل كود الدخول</h3>
                    <p id="otp-message" class="text-xs text-gray-400 mb-2">الكود الافتراضي: 000000</p>
                    <input type="password" id="pin-input" placeholder="••••••" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-black text-center text-3xl tracking-[0.4em] border-2 border-transparent focus:border-green-500">
                    <button onclick="verifyAccess()" class="w-full bg-green-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">دخول آمن</button>
                </div>
            </div>
        </div>

        <!-- 2. الواجهة الرئيسية -->
        <div id="main-view" class="w-full h-full flex flex-col hidden-view bg-white">
            <div class="h-[75px] bg-white flex items-center justify-between px-5 shrink-0 shadow-[0_2px_10px_rgba(0,0,0,0.05)] z-20">
                <div class="flex items-center gap-2">
                    <button id="logout-btn" onclick="logout()" class="hidden-view text-red-500 bg-red-50 p-2.5 rounded-xl active:scale-90"><i class="fas fa-power-off"></i></button>
                    <button id="admin-panel-btn" onclick="openAdminModal()" class="hidden-view text-yellow-600 bg-yellow-50 p-2.5 rounded-xl active:scale-90"><i class="fas fa-user-shield"></i></button>
                    <button onclick="openSettingsModal()" class="text-gray-500 bg-gray-100 p-2.5 rounded-xl active:scale-90"><i class="fas fa-cog"></i></button>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <h1 class="font-black text-xl text-slate-800 leading-none">Kimoup</h1>
                        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-1">we here to help you</p>
                    </div>
                    <div class="w-11 h-11 bg-slate-900 rounded-full flex items-center justify-center shadow-md border-2 border-sky-400">
                        <i class="fas fa-bolt text-sky-400 text-xl"></i>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-4 py-5 space-y-4 bg-slate-50/50">
                <button onclick="openAddFriendModal()" class="w-full py-4 bg-white border border-gray-200 rounded-3xl flex justify-center items-center gap-3 text-slate-700 font-bold shadow-sm active:scale-95 transition">
                    <i class="fas fa-plus-circle text-sky-500 text-xl"></i> إضافة دردشة جديدة
                </button>
                <div id="contacts-list" class="space-y-1 mt-4"></div>
            </div>
        </div>

        <!-- 3. شاشة الشات -->
        <div id="chat-view" class="absolute inset-0 bg-[#efeae2] z-[60] flex flex-col hidden-view animate-fade-in">
            <div class="h-[75px] bg-white flex items-center justify-between px-4 shrink-0 shadow-md z-20">
                <button onclick="closeChat()" class="p-3 text-gray-500 active:scale-125 transition"><i class="fas fa-arrow-left text-xl"></i></button>
                <div class="flex-1 flex flex-col items-end justify-center mr-3">
                    <div class="flex items-center gap-1">
                        <div id="active-chat-verified" class="hidden-view"><span class="verified-badge"><i class="fas fa-check"></i></span></div>
                        <h3 id="active-chat-name" class="font-black text-[16px] text-slate-800 truncate"></h3>
                    </div>
                    <p id="active-chat-status" class="text-[10px] text-gray-400 font-bold mt-0.5 truncate"></p>
                </div>
                <div class="w-12 h-12 bg-gray-100 rounded-full overflow-hidden shrink-0 border border-gray-200">
                    <img id="active-chat-img" src="" class="w-full h-full object-cover bg-white">
                </div>
            </div>
            
            <div id="messages-container"><div id="msg-wrapper" class="flex flex-col gap-2 p-4"></div></div>
            
            <div class="p-3 bg-[#f0f2f5] flex gap-2 items-center z-30 mb-2 px-3">
                <button id="btn-voice" onmousedown="startVoice(event)" onmouseup="stopVoice(event)" ontouchstart="startVoice(event)" ontouchend="stopVoice(event)" class="w-12 h-12 bg-sky-500 text-white rounded-full flex items-center justify-center shadow-lg active:scale-90 transition shrink-0">
                    <i class="fas fa-microphone text-xl"></i>
                </button>
                <div class="flex-1 bg-white rounded-3xl px-5 py-3 flex items-center shadow-sm">
                    <input type="text" id="m-input" placeholder="اكتب رسالة..." class="w-full bg-transparent outline-none font-bold text-sm text-slate-700">
                </div>
                <button onclick="sendText()" class="w-12 h-12 text-sky-500 bg-white rounded-full flex items-center justify-center shadow-md active:scale-90 transition shrink-0">
                    <i class="fas fa-paper-plane text-2xl rotate-[225deg]"></i>
                </button>
            </div>
            <div id="rec-toast" class="hidden-view absolute bottom-24 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-2 rounded-full text-sm font-bold shadow-2xl animate-pulse">جاري التسجيل...</div>
        </div>

        <!-- ================= Modals ================= -->

        <!-- إضافة صديق -->
        <div id="add-friend-modal" class="hidden-view fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl relative">
                <div class="w-16 h-16 bg-sky-500 rounded-full text-white flex items-center justify-center mx-auto -mt-16 border-[5px] border-white shadow-lg text-2xl"><i class="fas fa-user-plus"></i></div>
                <h3 class="mt-4 font-black text-xl">إضافة صديق</h3>
                <input type="tel" id="add-phone-input" placeholder="رقم الموبايل..." class="w-full p-4 mt-6 bg-gray-50 rounded-2xl outline-none font-bold text-center border border-gray-100 dir-ltr">
                <div class="flex gap-3 mt-6">
                    <button onclick="closeAddFriendModal()" class="flex-1 py-4 bg-gray-100 text-gray-500 font-bold rounded-2xl active:scale-95 transition">إلغاء</button>
                    <button onclick="confirmAddFriend()" class="flex-1 py-4 bg-sky-500 text-white font-bold rounded-2xl active:scale-95 shadow-md">إضافة وتحدث</button>
                </div>
            </div>
        </div>

        <!-- إعدادات الحساب -->
        <div id="settings-modal" class="hidden-view fixed inset-0 bg-slate-50 z-[100] flex flex-col animate-slide-up">
            <div class="bg-slate-800 h-[70px] flex items-center justify-between px-5 text-white shrink-0 shadow-lg">
                <div class="w-10"></div><h3 class="font-bold text-xl">إعدادات الحساب</h3><button onclick="closeSettingsModal()" class="p-2 bg-white/10 rounded-full w-10 h-10"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="relative flex justify-center -mt-12 mb-6 shrink-0">
                <div class="relative w-28 h-28 bg-slate-900 rounded-full border-[5px] border-white shadow-xl flex items-center justify-center overflow-hidden">
                    <img id="set-img-preview" src="" class="w-full h-full object-cover bg-white">
                    <label class="absolute bottom-0 right-0 bg-sky-500 w-8 h-8 rounded-full flex items-center justify-center border-2 border-white text-white cursor-pointer z-10"><i class="fas fa-camera text-xs"></i><input type="file" id="set-photo-input" class="hidden" accept="image/*"></label>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto px-5 pb-8 space-y-5 text-right">
                <div class="bg-white border border-gray-200 rounded-3xl p-5 shadow-sm">
                    <input type="text" id="set-name" placeholder="اسم العرض" class="w-full p-3.5 bg-gray-50 rounded-xl outline-none font-bold text-sm border border-gray-100 mb-3">
                    <input type="text" id="set-bio" placeholder="الحالة (Bio)" class="w-full p-3.5 bg-gray-50 rounded-xl outline-none font-bold text-sm border border-gray-100">
                </div>
                <div class="bg-white border border-gray-200 rounded-3xl p-5 shadow-sm">
                    <p class="text-[11px] text-gray-500 font-bold mb-2">تغيير كود الدخول:</p>
                    <input type="text" id="set-pass" placeholder="أدخل كود جديد" class="w-full p-3.5 bg-gray-50 rounded-xl outline-none font-bold text-center border border-gray-100 text-lg">
                </div>
                <button onclick="saveProfile()" class="w-full py-4 bg-slate-900 text-white font-black rounded-2xl shadow-xl active:scale-95 transition text-lg mt-2">حفظ التعديلات</button>
            </div>
        </div>

        <!-- لوحة الإدارة (للأدمن فقط) -->
        <div id="admin-modal" class="hidden-view fixed inset-0 bg-black/80 z-[110] flex items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-slate-900 w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col h-[85vh] border border-gray-700">
                <div class="p-6 text-white flex justify-between items-center border-b border-gray-700 shrink-0 bg-slate-800">
                    <button onclick="closeAdminModal()" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center"><i class="fas fa-times text-xl"></i></button>
                    <h3 class="font-black text-xl text-yellow-400">لوحة الإدارة والمراقبة</h3>
                </div>
                <div class="p-4 bg-gray-100 flex-1 overflow-y-auto space-y-4" id="admin-list"></div>
            </div>
        </div>

        <!-- مودال تعديل البيانات للأدمن -->
        <div id="admin-edit-modal" class="hidden-view fixed inset-0 bg-black/70 z-[120] flex items-center justify-center p-6 backdrop-blur-sm">
            <div class="bg-white w-full max-w-sm rounded-3xl p-8 text-right shadow-2xl">
                <h3 class="font-black text-xl mb-6 text-slate-800 border-b pb-4">تعديل كود المستخدم</h3>
                <div class="space-y-4 mb-8 text-center">
                    <p id="edit-u-phone" class="text-lg font-black text-sky-600 dir-ltr"></p>
                    <input type="text" id="edit-u-pin" placeholder="أدخل كود دخول جديد" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-black text-center text-2xl tracking-widest border border-sky-200">
                </div>
                <div class="flex gap-3">
                    <button onclick="closeAdminEdit()" class="flex-1 py-4 bg-gray-100 text-gray-500 font-bold rounded-2xl active:scale-95 transition">إلغاء</button>
                    <button onclick="saveAdminEdit()" class="flex-1 py-4 bg-sky-500 text-white font-black rounded-2xl active:scale-95 shadow-md">تغيير الكود</button>
                </div>
            </div>
        </div>

        <!-- شاشة التجسس -->
        <div id="spy-modal" class="hidden-view fixed inset-0 bg-white z-[150] flex flex-col">
            <div class="h-[75px] bg-slate-900 text-white flex items-center justify-between px-5 shrink-0 shadow-lg">
                <button onclick="closeSpyModal()" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center"><i class="fas fa-times text-xl"></i></button>
                <div class="text-right"><h3 class="font-black text-sm text-yellow-400">وضع المراقبة 👁️</h3><p id="spy-target-name" class="text-[10px] font-bold text-gray-300 mt-1"></p></div>
            </div>
            <div id="spy-contacts" class="p-3 bg-gray-100 border-b border-gray-200 shrink-0 overflow-x-auto flex gap-2 hide-scrollbar"></div>
            <div id="spy-messages-container" class="flex-1 bg-[#efeae2] relative overflow-y-auto">
                <div id="spy-msg-wrapper" class="flex flex-col gap-2 p-4"></div>
                <div id="spy-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 font-bold text-sm bg-white/50 backdrop-blur-sm"><i class="fas fa-user-secret text-6xl text-gray-200 mb-4"></i>اختر محادثة للمراقبة</div>
            </div>
        </div>

    </div>

    <script>
        // --- Firebase Core Setup ---
        const firebaseConfig = { apiKey: "AIzaSyBS3GcNh5ltgwUqSClSTUoRNgdJiTOf0RM", authDomain: "whatsapp-fcd3c.firebaseapp.com", projectId: "whatsapp-fcd3c", storageBucket: "whatsapp-fcd3c.firebasestorage.app", messagingSenderId: "369090984748", appId: "1:369090984748:web:cba013025b108578cd0a89" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); const auth = firebase.auth();

        const STABLE_APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'kimo-stable-pro-v1';
        const usersDb = db.collection('artifacts').doc(STABLE_APP_ID).collection('public').doc('data').collection('users');
        const chatsDb = db.collection('artifacts').doc(STABLE_APP_ID).collection('public').doc('data').collection('chats');

        const ADMIN_PHONE = "+201112215950";
        let currentUser = localStorage.getItem('kimo_stable_v1'); 
        let activeChatId = null, uCache = {}, tempPhone = "", profileBase64 = '';
        let mediaRec, audioChunks = [], spyTargetId = null, editingUserPhone = null;

        function showToast(msg) { const t = document.getElementById('alert-toast'); t.innerText = msg; t.classList.remove('hidden-view'); t.classList.add('toast-show'); setTimeout(() => { t.classList.add('hidden-view'); t.classList.remove('toast-show'); }, 3000); }

        // Boot Logic
        window.addEventListener('load', async () => {
            try { await auth.signInAnonymously(); } catch(e) {}
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0'; setTimeout(() => splash.classList.add('hidden-view'), 600);
                if(currentUser) initApp(); else document.getElementById('auth-view').classList.remove('hidden-view');
            }, 1000);
        });

        // --- 1. Login Logic ---
        async function checkNumberReady() {
            let p = document.getElementById('phone-input').value.trim();
            if(!p) return showToast("أدخل رقم الهاتف!");
            if(p.startsWith('0')) p = p.substring(1); tempPhone = "+20" + p;
            
            document.getElementById('btn-check').innerText = "جاري الاتصال...";
            try {
                const doc = await usersDb.doc(tempPhone).get();
                if(!doc.exists) {
                    await usersDb.doc(tempPhone).set({
                        phone: tempPhone, displayName: "مستخدم جديد", bio: 'متاح في Kimoup',
                        status: 'approved', loginCode: '000000', isVerified: tempPhone === ADMIN_PHONE,
                        contacts: [], createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else if(doc.data().status === 'banned') { showToast("أنت محظور 🚫"); return; }
                showStep('pin-step');
            } catch(e) { showToast("فشل الاتصال!"); }
            document.getElementById('btn-check').innerText = "متابعة";
        }

        function showStep(id) { ['check-step', 'pin-step'].forEach(i => document.getElementById(i).classList.add('hidden-view')); document.getElementById(id).classList.remove('hidden-view'); }

        async function verifyAccess() {
            const pin = document.getElementById('pin-input').value.trim(); if(!pin) return;
            try {
                const snap = await usersDb.doc(tempPhone).get();
                if (snap.data().loginCode === pin) {
                    currentUser = tempPhone; localStorage.setItem('kimo_stable_v1', currentUser);
                    initApp();
                } else showToast("كود الدخول خطأ!");
            } catch(e) { showToast("حدث خطأ!"); }
        }

        // --- 2. Main Application ---
        function initApp() {
            document.getElementById('auth-view').classList.add('hidden-view');
            document.getElementById('main-view').classList.remove('hidden-view');
            if (currentUser === ADMIN_PHONE) { document.getElementById('logout-btn').classList.remove('hidden-view'); document.getElementById('admin-panel-btn').classList.remove('hidden-view'); }

            usersDb.doc(currentUser).onSnapshot(s => {
                if(!s.exists) return logout();
                const me = s.data(); if(me.status === 'banned') { alert("حسابك محظور 🚫"); logout(); return; }
                profileBase64 = me.avatar || '';
                document.getElementById('set-img-preview').src = profileBase64 || `https://ui-avatars.com/api/?name=${me.displayName}`;
                document.getElementById('set-name').value = me.displayName || '';
                document.getElementById('set-bio').value = me.bio || '';
            });

            usersDb.onSnapshot(s => { s.docs.forEach(d => uCache[d.id] = d.data()); renderContacts(); });
        }

        function renderContacts() {
            const list = document.getElementById('contacts-list'); list.innerHTML = '';
            const myContacts = uCache[currentUser]?.contacts || [];
            let hasContacts = false;

            Object.values(uCache).forEach(u => {
                if(u.phone === currentUser || u.status === 'banned') return;
                if(currentUser !== ADMIN_PHONE && !myContacts.includes(u.phone)) return;
                hasContacts = true;
                const vIcon = u.isVerified ? '<span class="verified-badge"><i class="fas fa-check"></i></span>' : '';
                list.innerHTML += `
                    <div onclick="openChat('${u.phone}')" class="flex flex-row-reverse items-center gap-3 cursor-pointer p-3 active:bg-gray-100 rounded-2xl transition">
                        <div class="w-[52px] h-[52px] rounded-full shrink-0 overflow-hidden border shadow-sm"><img src="${u.avatar || `https://ui-avatars.com/api/?name=${u.displayName}`}" class="w-full h-full object-cover"></div>
                        <div class="text-right flex-1 overflow-hidden">
                            <div class="flex items-center justify-end gap-1">${vIcon}<h3 class="font-black text-[16px] text-slate-800 truncate">${u.displayName}</h3></div>
                            <p class="text-[11px] text-gray-400 mt-0.5 truncate">${u.bio || 'متاح'}</p>
                        </div>
                    </div><div class="w-[85%] mx-auto border-b border-gray-100 my-1"></div>`;
            });
            if(!hasContacts) list.innerHTML = `<div class="text-center py-16 opacity-50"><p class="font-bold">لا توجد جهات اتصال.</p></div>`;
        }

        // --- 3. Chat Logic ---
        function openChat(id) {
            activeChatId = id; const u = uCache[id];
            document.getElementById('chat-view').classList.remove('hidden-view');
            document.getElementById('active-chat-name').innerText = u.displayName;
            document.getElementById('active-chat-status').innerText = u.bio || 'متاح';
            document.getElementById('active-chat-verified').classList.toggle('hidden-view', !u.isVerified);
            document.getElementById('active-chat-img').src = u.avatar || `https://ui-avatars.com/api/?name=${u.displayName}`;
            loadMsgs();
        }

        let currentChatListener = null;
        function loadMsgs() {
            if(currentChatListener) currentChatListener(); 
            const cid = [currentUser, activeChatId].sort().join('_');
            const wrap = document.getElementById('msg-wrapper'), cont = document.getElementById('messages-container');
            currentChatListener = chatsDb.doc(cid).collection('messages').onSnapshot(s => {
                let msgs = []; s.forEach(d => msgs.push(d.data())); msgs.sort((a,b) => (a.t?.toMillis() || 0) - (b.t?.toMillis() || 0));
                wrap.innerHTML = msgs.map(m => {
                    const isMe = m.s === currentUser;
                    let body = m.type === 'voice' ? `<audio controls src="${m.data}"></audio>` : `<p style="white-space:pre-wrap;">${m.txt}</p>`;
                    return `<div class="flex flex-col ${isMe?'items-end':'items-start'} w-full"><div class="msg-bubble ${isMe?'msg-out':'msg-in'} shadow-sm">${body}</div></div>`;
                }).join('');
                cont.scrollTop = cont.scrollHeight;
            });
        }

        async function sendText() {
            const i = document.getElementById('m-input'), txt = i.value.trim(); if(!txt) return;
            const cid = [currentUser, activeChatId].sort().join('_'); i.value = '';
            await chatsDb.doc(cid).collection('messages').add({ s: currentUser, txt, type: 'text', t: firebase.firestore.FieldValue.serverTimestamp() });
        }

        // Voice
        async function startVoice(e) {
            if(e) e.preventDefault();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); mediaRec = new MediaRecorder(stream); audioChunks = [];
                mediaRec.ondataavailable = ev => audioChunks.push(ev.data);
                mediaRec.onstop = async () => {
                    if(audioChunks.length === 0) return; const audioBlob = new Blob(audioChunks, { type: 'audio/webm' }); const reader = new FileReader();
                    reader.onloadend = async () => {
                        const cid = [currentUser, activeChatId].sort().join('_');
                        await chatsDb.doc(cid).collection('messages').add({ s: currentUser, data: reader.result, type: 'voice', t: firebase.firestore.FieldValue.serverTimestamp() });
                    }; reader.readAsDataURL(audioBlob);
                }; mediaRec.start(); document.getElementById('rec-toast').classList.remove('hidden-view');
            } catch(err) { showToast("اسمح بالمايكروفون!"); }
        }
        function stopVoice(e) { if(e) e.preventDefault(); if(mediaRec && mediaRec.state !== 'inactive') { mediaRec.stop(); document.getElementById('rec-toast').classList.add('hidden-view'); mediaRec.stream.getTracks().forEach(t => t.stop()); } }

        // --- 4. Admin Panel & Controls ---
        function openAdminModal() {
            document.getElementById('admin-modal').classList.remove('hidden-view');
            const list = document.getElementById('admin-list');
            db.collection('artifacts').doc(STABLE_APP_ID).collection('public').doc('data').collection('users').onSnapshot(snap => {
                list.innerHTML = ''; snap.forEach(doc => {
                    const u = doc.data(); if(u.phone === ADMIN_PHONE) return; 
                    list.innerHTML += `
                        <div class="bg-white p-5 rounded-3xl border flex flex-col gap-4 mb-4 shadow-md">
                            <div class="flex justify-between items-center text-right">
                                <div class="flex-1 mr-3"><p class="font-black text-slate-800">${u.displayName} ${u.isVerified ? '<span class="verified-badge"><i class="fas fa-check"></i></span>' : ''}</p><p class="text-[11px] text-gray-500 font-bold">${u.phone}</p><p class="text-[10px] text-sky-600 font-black mt-1">كود: ${u.loginCode}</p></div>
                                <div class="text-[11px] font-black px-4 py-2 rounded-full ${u.status === 'banned' ? 'bg-red-500 text-white' : 'bg-green-500 text-white'} shadow-md">${u.status}</div>
                            </div>
                            <div class="flex flex-wrap gap-2 justify-end border-t pt-3">
                                ${u.isVerified ? `<button onclick="updateU('${u.phone}', {isVerified: false})" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl text-[11px] font-black">إزالة توثيق</button>` : `<button onclick="updateU('${u.phone}', {isVerified: true})" class="bg-sky-500 text-white px-4 py-2 rounded-xl text-[11px] font-black">توثيق 🔵</button>`}
                                ${u.status === 'banned' ? `<button onclick="updateU('${u.phone}', {status: 'approved'})" class="bg-green-100 text-green-700 px-4 py-2 rounded-xl text-[11px] font-black">فك حظر</button>` : `<button onclick="updateU('${u.phone}', {status: 'banned'})" class="bg-red-100 text-red-700 px-4 py-2 rounded-xl text-[11px] font-black">حظر 🚫</button>`}
                                <button onclick="openAdminEdit('${u.phone}')" class="bg-yellow-400 text-slate-900 px-4 py-2 rounded-xl text-[11px] font-black shadow-sm">تعديل كود ⚙️</button>
                                <button onclick="openSpyModal('${u.phone}', '${u.displayName}')" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[11px] font-black shadow-md">مراقبة 👁️</button>
                            </div>
                        </div>`;
                });
            });
        }
        async function updateU(p, upds) { await usersDb.doc(p).update(upds); showToast("تم التحديث"); }
        function openAdminEdit(p) { editingUserPhone = p; const u = uCache[p]; document.getElementById('edit-u-phone').innerText = p; document.getElementById('edit-u-pin').value = u.loginCode || ''; document.getElementById('admin-edit-modal').classList.remove('hidden-view'); }
        async function saveAdminEdit() { const pin = document.getElementById('edit-u-pin').value.trim(); if(pin) { await usersDb.doc(editingUserPhone).update({ loginCode: pin }); showToast("تم تحديث الكود!"); closeAdminEdit(); } }
        function closeAdminEdit() { document.getElementById('admin-edit-modal').classList.add('hidden-view'); }

        // Spy Mode
        function openSpyModal(p, n) {
            spyTargetId = p; document.getElementById('spy-modal').classList.remove('hidden-view');
            document.getElementById('spy-target-name').innerText = "الهدف: " + n;
            document.getElementById('spy-placeholder').classList.remove('hidden-view');
            const conts = document.getElementById('spy-contacts'); conts.innerHTML = '';
            const u = uCache[p];
            if(u?.contacts && u.contacts.length > 0) {
                u.contacts.forEach(cId => {
                    const cN = uCache[cId]?.displayName || cId;
                    conts.innerHTML += `<button onclick="loadSpyChat('${cId}')" class="shrink-0 bg-white px-5 py-2.5 rounded-2xl text-xs font-black shadow-md border text-slate-700 active:bg-sky-50 transition">${cN}</button>`;
                });
            } else conts.innerHTML = '<p class="text-xs text-gray-400 font-bold p-3">لا توجد محادثات.</p>';
        }

        let spyListener = null;
        function loadSpyChat(cId) {
            document.getElementById('spy-placeholder').classList.add('hidden-view');
            if(spyListener) spyListener();
            const cid = [spyTargetId, cId].sort().join('_');
            const wrap = document.getElementById('spy-msg-wrapper'), cont = document.getElementById('spy-messages-container');
            spyListener = chatsDb.doc(cid).collection('messages').onSnapshot(s => {
                let msgs = []; s.forEach(d => msgs.push(d.data())); msgs.sort((a,b) => (a.t?.toMillis() || 0) - (b.t?.toMillis() || 0));
                wrap.innerHTML = msgs.map(m => {
                    const isT = m.s === spyTargetId;
                    let body = m.type === 'voice' ? `<audio controls src="${m.data}"></audio>` : `<p style="white-space:pre-wrap;">${m.txt}</p>`;
                    return `<div class="flex flex-col ${isT?'items-end':'items-start'} w-full"><div class="msg-bubble ${isT?'bg-green-100 shadow-sm':'bg-white shadow-sm'}">${body}</div></div>`;
                }).join('');
                cont.scrollTop = cont.scrollHeight;
            });
        }
        function closeSpyModal() { document.getElementById('spy-modal').classList.add('hidden-view'); if(spyListener) spyListener(); }

        // Utils
        function logout() { localStorage.clear(); location.reload(); }
        function closeChat() { document.getElementById('chat-view').classList.add('hidden-view'); }
        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden-view'); }
        function openSettingsModal() { document.getElementById('settings-modal').classList.remove('hidden-view'); }
        function closeSettingsModal() { document.getElementById('settings-modal').classList.add('hidden-view'); }
        function openAddFriendModal() { document.getElementById('add-friend-modal').classList.remove('hidden-view'); }
        function closeAddFriendModal() { document.getElementById('add-friend-modal').classList.add('hidden-view'); }
        async function confirmAddFriend() { let p = document.getElementById('add-phone-input').value.trim(); if(!p) return; if(p.startsWith('0')) p = p.substring(1); p = "+20"+p; const doc = await usersDb.doc(p).get(); if(doc.exists && doc.data().status !== 'banned') { await usersDb.doc(currentUser).update({ contacts: firebase.firestore.FieldValue.arrayUnion(p) }); closeAddFriendModal(); openChat(p); } else showToast("رقم غير مسجل!"); }
        async function saveProfile() { const n = document.getElementById('set-name').value.trim(); const b = document.getElementById('set-bio').value.trim(); const p = document.getElementById('set-pass').value.trim(); if(!n) return showToast('الاسم مطلوب!'); let upd = { displayName: n, bio: b, avatar: profileBase64 }; if(p && p.length >= 4) upd.loginCode = p; await usersDb.doc(currentUser).update(upd); showToast("تم الحفظ ✅"); closeSettingsModal(); }
        document.getElementById('set-photo-input').onchange = e => { const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=ev=>{ profileBase64=ev.target.result; document.getElementById('set-img-preview').src=profileBase64; }; r.readAsDataURL(f); } };
    </script>
</body>
</html>
