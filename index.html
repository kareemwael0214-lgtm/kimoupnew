<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Kimoup VIP</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Cairo','sans-serif']}}}}</script>
<style>
*{-webkit-tap-highlight-color:transparent;outline:none;scrollbar-width:none}
body{background:#0f172a;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;margin:0}
.app{width:100%;height:100%;background:#fff;position:relative;display:flex;flex-direction:column;overflow:hidden;transition:background .3s,color .3s}
@media(min-width:768px){.app{width:400px;height:840px;border-radius:2rem;border:8px solid #1e293b;box-shadow:0 40px 80px rgba(0,0,0,.5)}}
.cbg{background-color:#efeae2;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c8bfb4' fill-opacity='.12'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E")}
#mc{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:10px;gap:3px;scroll-behavior:smooth}
.mb{max-width:82%;padding:6px 10px 3px;font-weight:700;font-size:13px;box-shadow:0 1px 1px rgba(0,0,0,.06);border-radius:10px;position:relative;word-break:break-word}
.mo{background:#dcf8c6;border-top-right-radius:2px;align-self:flex-end}
.mi{background:#fff;border-top-left-radius:2px;align-self:flex-start}
.mt{font-size:9px;color:#8a9a9b;display:block;text-align:left;margin-top:1px;direction:ltr}.mo .mt{text-align:right}
.vb{background:#0ea5e9;color:#fff;border-radius:50%;width:13px;height:13px;display:inline-flex;align-items:center;justify-content:center;font-size:7px;margin-right:2px;box-shadow:0 0 0 1.5px #fff;flex-shrink:0}
.sy{background:#fff3cd;color:#856404;font-size:10px;text-align:center;padding:4px 12px;border-radius:8px;margin:6px auto;font-weight:700;width:fit-content;border:1px solid #ffeaa7}
.cb{background:#f0f9ff;border:1.5px solid #0ea5e9;border-radius:10px;padding:8px;width:100%;color:#0c4a6e;font-size:11px;white-space:pre-line}
.hv{display:none!important}::-webkit-scrollbar{display:none}audio{height:30px;width:180px}
.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;transition:.2s;padding:6px 0;cursor:pointer;border:none;background:none}
.nb.a{color:#0ea5e9;border-top:3px solid #0ea5e9;background:linear-gradient(to bottom,#f0f9ff,#fff)}
.nb.i{color:#94a3b8;border-top:3px solid transparent}
.asu{animation:su .3s ease-out}.afi{animation:fi .2s ease-out}.apo{animation:po .2s ease-out}
.sr{padding:2px;border-radius:50%;background:conic-gradient(from 0deg,#25d366,#128c7e,#075e54,#25d366)}
.srs{padding:2px;border-radius:50%;background:#d1d5db}
.lt{font-size:9px;padding:2px 6px;border-radius:20px;font-weight:800;display:inline-block}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:200px;overflow-y:auto}
.emoji-grid button{font-size:20px;padding:4px;border:none;background:none;cursor:pointer;border-radius:6px;transition:.15s}
.ctx-menu{position:fixed;background:#fff;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.2);padding:4px;z-index:9999;min-width:160px;overflow:hidden}
.ctx-menu button{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border:none;background:none;font-size:12px;font-weight:700;cursor:pointer;color:#334155;transition:.15s}
.react-bar{display:flex;gap:2px;background:#fff;border-radius:20px;padding:4px 8px;box-shadow:0 4px 20px rgba(0,0,0,.15);position:fixed;z-index:9999}
.msg-reacts{display:flex;gap:1px;margin-top:2px;flex-wrap:wrap}
.msg-reacts span{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:1px 5px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:2px}
.unread-badge{background:#ef4444;color:#fff;border-radius:50%;min-width:18px;height:18px;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0}
.search-box{background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:12px;padding:8px 12px;display:flex;align-items:center;gap:8px;margin:0 0 8px 0}
.search-box input{flex:1;background:none;border:none;outline:none;font-size:12px;font-weight:700}
.dark .app{background:#0f172a;color:#e2e8f0}
.dark .cbg{background-color:#0b1120}
.dark .mo{background:#065f46}.dark .mi{background:#1e293b}
.dark .ctx-menu{background:#1e293b}.dark .ctx-menu button{color:#e2e8f0}
</style>
</head>
<body>

<div id="sp" class="fixed inset-0 bg-gradient-to-br from-slate-900 via-slate-800 to-sky-900 z-[999] flex flex-col items-center justify-center transition-opacity duration-700">
    <div class="w-24 h-24 bg-white/10 backdrop-blur-xl rounded-2xl flex items-center justify-center shadow-2xl mb-5 border border-white/20"><i class="fas fa-bolt text-5xl text-sky-400"></i></div>
    <h1 class="text-3xl font-black text-white">Kimoup</h1>
    <p class="text-[10px] text-sky-300 font-bold uppercase tracking-[.3em] mt-1">Business VIP</p>
</div>

<div id="toast" class="hv fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-2.5 rounded-2xl text-xs font-bold shadow-2xl z-[99999] text-center w-4/5 border border-slate-700"></div>

<div class="app" id="app">
    <div id="v-auth" class="absolute inset-0 bg-white z-[100] flex flex-col items-center justify-center p-5 hv">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-black text-slate-800 mb-6">تسجيل الدخول</h2>
            <div id="s-chk" class="space-y-3">
                <div id="ph-wrap" class="bg-gray-50 border-2 border-gray-100 rounded-xl p-3 flex items-center">
                    <span class="text-gray-400 font-bold ml-2 border-l pl-2">+20</span>
                    <input type="tel" id="in-ph" placeholder="1012345678" class="w-full bg-transparent outline-none font-bold text-lg text-right" dir="ltr" oninput="checkPhFormat()">
                </div>
                <button onclick="chkPhone()" id="btn-chk" class="w-full bg-sky-500 text-white font-bold py-3.5 rounded-xl shadow-lg">إرسال الكود</button>
            </div>
            <div id="s-pin" class="hv space-y-3">
                <input type="password" id="in-pin" placeholder="000000" maxlength="6" class="w-full p-3 bg-gray-50 rounded-xl text-center text-3xl tracking-[.3em]" dir="ltr">
                <button onclick="verifyPin()" id="btn-pin" class="w-full bg-green-500 text-white font-bold py-3.5 rounded-xl shadow-lg">دخول</button>
            </div>
        </div>
    </div>

    <div id="v-main" class="w-full h-full flex flex-col hv bg-white">
        <div class="h-[60px] bg-white flex items-center justify-between px-3 shrink-0 shadow-sm z-20">
            <div class="flex items-center gap-1">
                <button id="btn-lo" onclick="logout()" class="hv text-red-500 bg-red-50 p-1.5 rounded-lg text-xs"><i class="fas fa-power-off"></i></button>
                <button id="btn-ad" onclick="openAdmin()" class="hv text-yellow-600 bg-yellow-50 p-1.5 rounded-lg text-xs"><i class="fas fa-crown"></i></button>
                <button onclick="openSettings()" class="text-gray-400 bg-gray-100 p-1.5 rounded-lg text-xs"><i class="fas fa-cog"></i></button>
                <button id="btn-biz" onclick="openBiz()" class="hv text-sky-600 bg-sky-50 p-1.5 rounded-lg text-xs"><i class="fas fa-store"></i></button>
            </div>
            <h1 class="font-black text-base text-slate-800">Kimoup</h1>
        </div>
        <div class="flex-1 overflow-hidden relative">
            <div id="t-chats" class="absolute inset-0 overflow-y-auto px-3 py-3 bg-slate-50/50">
                <div id="cl" class="space-y-0.5"></div>
            </div>
        </div>
        <div class="h-[56px] bg-white border-t border-gray-100 flex items-center shrink-0 z-20">
            <button onclick="swTab('chats')" id="nb-chats" class="nb a"><i class="fas fa-comment-dots text-lg"></i></button>
            <button onclick="swTab('groups')" id="nb-groups" class="nb i"><i class="fas fa-shield-halved text-lg"></i></button>
            <button onclick="swTab('status')" id="nb-status" class="nb i"><i class="fas fa-circle-notch text-lg"></i></button>
        </div>
    </div>

    <div id="v-chat" class="absolute inset-0 bg-[#efeae2] z-[60] flex flex-col hv afi">
        <div class="h-[56px] bg-white flex items-center justify-between px-3 shrink-0 shadow-md">
            <button onclick="closeChat()" class="p-2 text-gray-500"><i class="fas fa-arrow-left"></i></button>
            <h3 id="cn" class="font-black text-[14px] text-slate-800"></h3>
            <div class="w-10 h-10 bg-gray-100 rounded-full overflow-hidden border-2 border-white"><img id="ci" src="" class="w-full h-full object-cover"></div>
        </div>
        <div id="mc" class="cbg flex-1 overflow-y-auto p-3"><div id="mw" class="flex flex-col gap-1"></div></div>
        <div id="c-ia" class="p-2 bg-[#f0f2f5] flex gap-1.5 items-center">
            <input type="text" id="mi" placeholder="رسالة..." class="flex-1 bg-white rounded-full px-4 py-2 outline-none text-xs">
            <button onclick="sendTxt()" class="w-10 h-10 text-sky-500 bg-white rounded-full flex items-center justify-center shadow"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="v-set" class="hv fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-3">
        <div class="bg-white w-full max-w-sm rounded-xl p-5 space-y-4">
            <h3 class="font-black text-center">الإعدادات</h3>
            <div class="flex flex-col items-center gap-2">
                <img id="s-ip" src="" class="w-16 h-16 rounded-full border shadow">
                <input type="file" id="s-pi" class="hidden" accept="image/*">
                <button onclick="el('s-pi').click()" class="text-[10px] bg-sky-50 text-sky-600 px-2 py-1 rounded">تغيير الصورة</button>
            </div>
            <input type="text" id="s-nm" placeholder="الاسم" class="w-full p-2 bg-gray-50 rounded border text-xs">
            <input type="text" id="s-bi" placeholder="النبذة" class="w-full p-2 bg-gray-50 rounded border text-xs">
            <div class="flex items-center justify-between">
                <span class="text-xs font-bold">حساب أعمال</span>
                <input type="checkbox" id="s-biz">
            </div>
            <div class="flex gap-2">
                <button onclick="el('v-set').classList.add('hv')" class="flex-1 bg-gray-200 py-2 rounded text-xs">إلغاء</button>
                <button onclick="saveProf()" class="flex-1 bg-sky-500 text-white py-2 rounded text-xs">حفظ</button>
            </div>
        </div>
    </div>
</div>

<script>
var db=null;
try{firebase.initializeApp({apiKey:"AIzaSyBS3GcNh5ltgwUqSClSTUoRNgdJiTOf0RM",authDomain:"whatsapp-fcd3c.firebaseapp.com",projectId:"whatsapp-fcd3c",storageBucket:"whatsapp-fcd3c.firebasestorage.app",messagingSenderId:"369090984748",appId:"1:369090984748:web:cba013025b108578cd0a89"});db=firebase.firestore()}catch(e){}

var ADM="+201112215950", A="kimo-master-vip-v10", uD=null, cD=null, gD=null;
if(db){
    uD=db.collection("artifacts").doc(A).collection("public").doc("data").collection("users");
    cD=db.collection("artifacts").doc(A).collection("public").doc("data").collection("chats");
}

var me=localStorage.getItem("kimo_master_vip_v10"), uC={}, aId=null, pBase="", darkMode=false;

function el(id){return document.getElementById(id)}
function toast(m){var t=el("toast");t.innerText=m;t.classList.remove("hv");setTimeout(()=>t.classList.add("hv"),3000)}
function av(n){return"https://ui-avatars.com/api/?name="+encodeURIComponent(n||"U")}

// --- Auth Functions ---
function checkPhFormat(){/* Logic same as before */}
function chkPhone(){
    var raw=el("in-ph").value.replace(/\D/g,"");
    if(raw.startsWith("0")) raw=raw.substring(1);
    var ph="+20"+raw;
    uD.doc(ph).get().then(s => {
        if(!s.exists) uD.doc(ph).set({phone:ph, displayName:"مستخدم جديد", bio:"متاح", isBusiness:false, loginCode:"1234"});
        el("s-chk").classList.add("hv"); el("s-pin").classList.remove("hv");
    });
}
function verifyPin(){
    var raw=el("in-ph").value.replace(/\D/g,""); if(raw.startsWith("0")) raw=raw.substring(1);
    var ph="+20"+raw, pin=el("in-pin").value;
    uD.doc(ph).get().then(s => {
        if(s.data().loginCode == pin){
            me=ph; localStorage.setItem("kimo_master_vip_v10",me); location.reload();
        } else toast("كود خطأ");
    });
}

// --- App Core ---
function initApp(){
    el("v-auth").classList.add("hv"); el("v-main").classList.remove("hv");
    if(me===ADM) el("btn-ad").classList.remove("hv");

    // Real-time listener for ALL users
    uD.onSnapshot(s => {
        s.forEach(doc => { uC[doc.id] = doc.data(); });
        rCL();
        if(aId && aTyp==='direct') updateChatHeader();
    });

    // Special listener for ME (Dark mode & Biz status)
    uD.doc(me).onSnapshot(s => {
        var d = s.data();
        if(d.darkMode !== undefined) {
            darkMode = d.darkMode;
            document.body.classList.toggle("dark", darkMode);
        }
        el("btn-biz").classList.toggle("hv", !d.isBusiness);
    });
}

function rCL(){
    var l=el("cl"); l.innerHTML="";
    for(var k in uC){
        if(k===me) continue;
        var u=uC[k];
        l.innerHTML += `<div onclick="openChat('${k}','direct')" class="flex items-center gap-3 p-3 border-b cursor-pointer">
            <img src="${u.avatar||av(u.displayName)}" class="w-10 h-10 rounded-full">
            <div class="text-right">
                <p class="font-bold text-sm">${u.displayName}</p>
                <p class="text-[10px] text-gray-500">${u.bio}</p>
            </div>
        </div>`;
    }
}

// --- Profile & Business Logic (FIXED) ---
function openSettings(){
    uD.doc(me).get().then(s => {
        var d = s.data();
        el("s-nm").value = d.displayName;
        el("s-bi").value = d.bio;
        el("s-biz").checked = d.isBusiness;
        el("s-ip").src = d.avatar || av(d.displayName);
        pBase = d.avatar || "";
        el("v-set").classList.remove("hv");
    });
}

function saveProf(){
    var up = {
        displayName: el("s-nm").value.trim(),
        bio: el("s-bi").value.trim(),
        isBusiness: el("s-biz").checked,
        avatar: pBase
    };
    uD.doc(me).update(up).then(() => {
        toast("تم الحفظ بنجاح ✅");
        el("v-set").classList.add("hv");
    });
}

// Image handling
el("s-pi").onchange = function(e){
    var f=e.target.files[0];
    var r=new FileReader();
    r.onload = function(ev){ pBase=ev.target.result; el("s-ip").src=pBase; };
    r.readAsDataURL(f);
};

// --- Chat Logic ---
function openChat(id, typ){
    aId=id; aTyp=typ; el("v-chat").classList.remove("hv");
    updateChatHeader();
    lMsg();
}

function updateChatHeader(){
    var u = uC[aId];
    el("cn").innerText = u.displayName;
    el("ci").src = u.avatar || av(u.displayName);
}

function closeChat(){ el("v-chat").classList.add("hv"); aId=null; }

function lMsg(){
    var c=cid(me,aId), col=cD.doc(c).collection("messages");
    col.orderBy("t").onSnapshot(s => {
        var h="";
        s.forEach(d => {
            var m=d.data(), isMe=m.s===me;
            h+=`<div class="flex ${isMe?'justify-end':'justify-start'}">
                <div class="mb ${isMe?'mo':'mi'}">${escH(m.txt)}</div>
            </div>`;
        });
        el("mw").innerHTML=h; el("mc").scrollTop=el("mc").scrollHeight;
    });
}

function sendTxt(){
    var inp=el("mi"), txt=inp.value.trim(); if(!txt)return;
    var c=cid(me,aId), col=cD.doc(c).collection("messages");
    col.add({s:me, txt:txt, t:firebase.firestore.FieldValue.serverTimestamp()});
    inp.value="";
}

function cid(a,b){return[a,b].sort().join("_")}
function escH(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

window.onload = () => { if(me) initApp(); else el("v-auth").classList.remove("hv"); el("sp").classList.add("hv"); };
</script>
</body>
</html>
