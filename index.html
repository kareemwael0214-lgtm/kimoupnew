<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كيمو اب - Kimo App Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Lalezar&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kimo: { main: '#0ea5e9', dark: '#0284c7', light: '#f0f9ff', border: '#e2e8f0', text: '#0f172a' }
                    }
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: #cbd5e1; font-family: 'Cairo', sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        .app-container { width: 100%; height: 100%; background: white; position: relative; display: flex; overflow: hidden; }
        @media (min-width: 768px) { .app-container { width: 98%; height: 96%; border-radius: 1rem; } }

        .frame-admin { border: 3px solid #eab308; padding: 2px; background: linear-gradient(to right, #eab308, #fef08a, #eab308); background-size: 200% 200%; animation: shimmer 2s infinite linear; box-shadow: 0 0 15px rgba(234, 179, 8, 0.6); }
        @keyframes shimmer { 0% {background-position: 0% 0%;} 100% {background-position: -200% 0%;} }

        .msg-out { background-color: #dcf8c6; border-radius: 15px 15px 0 15px; align-self: flex-end; border: 1px solid #c7e5b0; }
        .msg-in { background-color: #ffffff; border-radius: 15px 15px 15px 0; align-self: flex-start; border: 1px solid #e2e8f0; }

        #messages-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 15px; gap: 8px; background-color: #efeae2; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        #messages-container::-webkit-scrollbar { width: 4px; }
        #messages-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        .font-lalezar { font-family: 'Lalezar', cursive; }

        /* ستايل الفويس مسدج */
        audio::-webkit-media-controls-panel { background-color: #f1f5f9; }
        .voice-msg-player { min-width: 200px; height: 40px; border-radius: 20px; }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen" class="fixed inset-0 bg-kimo-main z-[999] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="bg-white p-6 rounded-[2.5rem] shadow-2xl mb-4 animate-pulse">
            <i class="fas fa-bolt text-5xl text-kimo-main"></i>
        </div>
        <h1 class="text-4xl text-white font-bold font-lalezar tracking-widest">كيمو اب</h1>
        <div class="mt-8 w-10 h-10 border-4 border-white/20 border-t-white rounded-full animate-spin"></div>
    </div>

    <!-- Inputs -->
    <input type="file" id="global-image-picker" accept="image/*" class="hidden">
    <input type="file" id="chat-attachment-picker" class="hidden">

    <div class="app-container shadow-2xl">

        <!-- 1. شاشة الدخول -->
        <div id="auth-screen" class="absolute inset-0 bg-white z-50 flex flex-col items-center justify-center p-6 hidden">
            <div class="w-20 h-20 bg-kimo-main rounded-2xl flex items-center justify-center mb-4 shadow-lg text-white">
                <i class="fas fa-shield-halved text-4xl"></i>
            </div>
            <h2 class="text-3xl font-bold font-lalezar text-kimo-text mb-1">دخول كيمو اب</h2>
            <p class="text-gray-400 text-sm mb-8 font-bold">بوابة تواصل المبدعين</p>
            
            <div id="phone-container" class="w-full max-w-sm">
                <div class="flex items-center border-2 border-gray-100 rounded-2xl p-3 mb-4 bg-gray-50 focus-within:border-kimo-main transition-all">
                    <span class="text-gray-400 font-bold px-3 border-l border-gray-200">+20</span>
                    <input type="tel" id="phone-input" placeholder="1112215950" class="w-full bg-transparent px-3 outline-none font-bold text-lg dir-ltr text-right">
                </div>
                <button onclick="requestOTP()" class="w-full bg-kimo-main text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">دخول سريع</button>
            </div>

            <div id="otp-container" class="w-full max-w-sm hidden text-center">
                <p class="text-sm text-gray-500 mb-4 font-bold">أدخل كود الدخول الخاص بك</p>
                <input type="password" id="otp-input" placeholder="••••••" class="w-full p-4 border-2 border-gray-100 rounded-2xl mb-6 text-center text-3xl font-bold tracking-[0.5em] bg-gray-50 outline-none focus:border-kimo-main" dir="ltr">
                <button onclick="verifyCode()" class="w-full bg-kimo-main text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 mb-4">تأكيد الكود</button>
                <button onclick="location.reload()" class="text-kimo-main font-bold text-xs underline">تعديل الرقم</button>
            </div>
        </div>

        <!-- 2. واجهة التطبيق -->
        <div id="app-content" class="w-full h-full flex hidden">
            
            <!-- Sidebar -->
            <div id="sidebar" class="w-full md:w-[320px] h-full bg-white flex flex-col border-l border-gray-100 z-40 transition-all shrink-0">
                <div class="h-[70px] px-4 flex items-center justify-between border-b border-gray-50 shrink-0">
                    <div onclick="openProfile()" class="flex items-center gap-3 cursor-pointer overflow-hidden">
                        <div id="my-avatar-wrap" class="w-10 h-10 rounded-full shrink-0 relative">
                            <img id="my-avatar-img" src="" class="w-full h-full rounded-full object-cover bg-gray-100">
                            <i id="my-admin-crown" class="fas fa-crown text-yellow-500 absolute -top-2 -right-2 text-base hidden"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h3 id="my-name-display" class="font-bold text-sm text-kimo-text truncate"></h3>
                            <p id="my-bio-display" class="text-[9px] text-gray-400 truncate font-semibold"></p>
                        </div>
                    </div>
                    <div class="flex gap-1 items-center">
                        <button id="admin-panel-btn" onclick="openAdminPanel()" class="hidden text-yellow-500 p-2 relative"><i class="fas fa-user-shield text-xl"></i><span id="admin-req-badge" class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white hidden"></span></button>
                        <button onclick="openCreateGroupModal()" class="text-gray-400 hover:text-kimo-main p-2"><i class="fas fa-users-rectangle text-xl"></i></button>
                        <button onclick="logout()" class="text-red-300 hover:text-red-500 p-2"><i class="fas fa-power-off text-xl"></i></button>
                    </div>
                </div>

                <div class="p-3 bg-gray-50/50 shrink-0">
                    <button onclick="startNewChat()" class="w-full bg-white border border-gray-200 py-2.5 rounded-xl font-bold text-xs shadow-sm hover:bg-gray-50 flex justify-center items-center gap-2">
                        <i class="fas fa-user-plus text-kimo-main"></i> إضافة صديق
                    </button>
                </div>

                <div class="flex-1 overflow-y-auto" id="contacts-list"></div>
            </div>

            <!-- منطقة الشات -->
            <div id="chat-area" class="flex-1 h-full flex flex-col bg-[#efeae2] relative hidden md:flex">
                
                <div class="h-[70px] bg-white border-b border-gray-100 flex items-center px-2 shrink-0 z-30 shadow-sm cursor-pointer" onclick="handleChatHeaderClick()">
                    <button onclick="closeChatArea(); event.stopPropagation();" class="md:hidden text-gray-400 p-3"><i class="fas fa-arrow-right text-lg"></i></button>
                    <div id="chat-header-avatar-wrap" class="w-11 h-11 rounded-full shrink-0 relative mx-2">
                        <img id="active-chat-avatar" src="" class="w-full h-full rounded-full object-cover bg-gray-100">
                        <i id="active-chat-admin-crown" class="fas fa-crown text-yellow-500 absolute -top-2 -right-2 text-lg hidden"></i>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="flex items-center gap-1">

                            <i id="active-chat-verified" class="fas fa-check-circle text-blue-500 hidden text-xs"></i>
                        </div>
                        <p id="active-chat-status" class="text-[10px] text-kimo-main font-bold truncate"></p>
                    </div>
                </div>

                <div id="messages-container">
                    <div class="chat-scroll-area" id="messages-wrapper"></div>
                </div>

                <!-- شريط الإدخال المطور (مع الفويس مسدج) -->
                <div class="min-h-[65px] bg-[#f0f2f5] p-2 flex items-end gap-2 border-t border-gray-200 shrink-0 z-30">
                    <div class="flex-1 bg-white rounded-2xl flex items-center px-1 shadow-sm border border-gray-200 min-h-[48px] overflow-hidden relative">
                        
                        <!-- زر المرفقات -->
                        <button id="btn-attach" onclick="triggerChatAttachment()" class="text-gray-400 hover:text-kimo-main p-3"><i class="fas fa-paperclip text-xl"></i></button>
                        
                        <!-- مربع النص -->
                        <input type="text" id="message-input" placeholder="اكتب رسالة..." class="w-full bg-transparent py-3 px-1 outline-none text-[15px] font-semibold" onkeypress="if(event.key === 'Enter') sendMsg()">
                        
                        <!-- واجهة التسجيل الصوتي (مخفية) -->
                        <div id="voice-recording-ui" class="absolute inset-0 bg-white hidden flex items-center justify-between px-4">
                            <div class="flex items-center gap-3 text-red-500 animate-pulse font-bold">
                                <i class="fas fa-circle text-[10px]"></i>
                                <span id="recording-timer">00:00</span>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="cancelRecording()" class="text-gray-400 font-bold text-xs px-2">إلغاء</button>
                                <button onclick="stopAndSendRecording()" class="bg-red-500 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-md"><i class="fas fa-stop text-xs"></i></button>
                            </div>
                        </div>
                    </div>

                    <!-- زر الإرسال / المايك -->
                    <div id="action-buttons-wrap">
                        <!-- زر المايك (يتحول لزر إرسال عند الكتابة) -->
                        <button id="btn-voice" onclick="startRecording()" class="bg-kimo-main text-white w-[50px] h-[50px] rounded-full flex items-center justify-center shadow-lg active:scale-90 transition transform">
                            <i class="fas fa-microphone text-xl"></i>
                        </button>
                        <button id="btn-send" onclick="sendMsg()" class="hidden bg-kimo-main text-white w-[50px] h-[50px] rounded-full flex items-center justify-center shadow-lg active:scale-90 transition transform">
                            <i class="fas fa-location-arrow fa-rotate-270 text-xl pr-1 mt-1"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Welcome -->
            <div id="welcome-screen" class="hidden md:flex flex-1 h-full flex-col items-center justify-center bg-[#f0f2f5] text-center border-r border-gray-100">
                <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-md mb-4 text-kimo-main">
                    <i class="fas fa-bolt text-4xl animate-bounce"></i>
                </div>
                <h2 class="text-2xl font-bold font-lalezar text-gray-700">كيمو اب</h2>
                <p class="text-gray-400 font-bold mt-2">اختر صديقاً لبدء المحادثة</p>
            </div>
        </div>
    </div>

    <!-- Modals (Settings, Admin, Groups) -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-end md:items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-full md:max-w-md rounded-t-3xl md:rounded-3xl shadow-2xl overflow-hidden transition-all transform duration-300 translate-y-full" id="settings-modal-content">
            <div class="bg-kimo-main p-4 text-white flex justify-between items-center"><h3 class="font-bold">إعدادات الحساب</h3><button onclick="closeProfile()"><i class="fas fa-times text-xl"></i></button></div>
            <div class="p-6 space-y-4 max-h-[75vh] overflow-y-auto bg-gray-50 text-right">
                <div class="flex flex-col items-center mb-4 relative">
                    <img id="profile-preview-img" src="" class="w-20 h-20 rounded-full object-cover border-4 border-white shadow-md">
                    <button onclick="triggerImageUpload('profile')" class="absolute bottom-0 right-1/2 translate-x-10 bg-kimo-main text-white w-9 h-9 rounded-full flex items-center justify-center border-2 border-white shadow-md"><i class="fas fa-camera"></i></button>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-gray-200">
                    <label class="text-[10px] font-bold text-gray-400 block mb-1">تغيير كود الدخول (Password):</label>
                    <input type="text" id="set-login-code" placeholder="تغيير كود الـ 000000" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none font-bold text-center dir-ltr">
                </div>
                <div class="bg-white p-4 rounded-2xl border border-gray-200 space-y-3">
                    <input type="text" id="set-name" placeholder="اسمك" class="w-full p-2.5 bg-gray-50 border rounded-xl outline-none font-bold">
                    <input type="text" id="set-bio" placeholder="الحالة" class="w-full p-2.5 bg-gray-50 border rounded-xl outline-none font-semibold">
                </div>
                <div id="admin-settings-zone" class="hidden bg-yellow-50 p-4 rounded-2xl border border-yellow-200">
                    <h4 class="font-bold text-yellow-700 text-xs mb-2">رد الأدمن التلقائي:</h4>
                    <textarea id="set-auto-reply" rows="2" class="w-full p-2 border rounded-xl outline-none text-sm font-semibold"></textarea>
                </div>
                <div class="flex items-center justify-between p-4 bg-white rounded-2xl border border-gray-200"><span class="font-bold text-xs">حساب تجاري</span><input type="checkbox" id="biz-toggle" onchange="toggleBiz()" class="w-5 h-5"></div>
                <div id="biz-zone" class="hidden bg-white p-4 rounded-2xl border border-gray-200 space-y-3">
                    <select id="set-font" class="w-full p-2 border rounded-xl text-xs font-bold bg-gray-50"><option value="font-cairo">خط كايرو</option><option value="font-tajawal">خط تجوال</option><option value="font-ruqaa">خط الرقعة</option><option value="font-lalezar">خط عريض</option></select>
                    <div class="flex justify-around p-2 bg-gray-50 rounded-xl">
                        <div class="cursor-pointer" onclick="setFrame('frame-none')"><div class="w-8 h-8 rounded-full border border-gray-300" id="f-none"></div></div>
                        <div class="cursor-pointer" onclick="setFrame('frame-gold')"><div class="w-8 h-8 rounded-full border-2 border-yellow-400" id="f-gold"></div></div>
                        <div class="cursor-pointer" onclick="setFrame('frame-gradient')"><div class="w-8 h-8 rounded-full bg-gradient-to-tr from-orange-400 to-purple-600 p-[1px]" id="f-grad"><div class="w-full h-full bg-white rounded-full"></div></div></div>
                    </div>
                    <input type="hidden" id="selected-frame" value="frame-none">
                </div>
                <button id="verify-btn-ui" onclick="requestVerification()" class="w-full py-3.5 rounded-2xl font-bold text-xs bg-blue-50 text-blue-600 border border-blue-100">طلب توثيق الحساب ✓</button>
            </div>
            <div class="p-4 bg-white border-t"><button onclick="saveProfile()" class="w-full bg-kimo-main text-white font-bold py-4 rounded-2xl shadow-xl">حفظ التعديلات</button></div>
        </div>
    </div>

    <!-- مراجعة الأدمن -->
    <div id="admin-modal" class="hidden fixed inset-0 bg-black/70 z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl">
            <div class="bg-gray-900 p-4 text-white flex justify-between items-center"><h3 class="font-bold">طلبات التوثيق</h3><button onclick="closeAdminPanel()"><i class="fas fa-times text-xl"></i></button></div>
            <div class="p-4 max-h-[60vh] overflow-y-auto bg-gray-50" id="admin-requests-list"></div>
        </div>
    </div>
    <div id="admin-review-modal" class="hidden fixed inset-0 bg-black/80 z-[120] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden text-center p-6 shadow-2xl">
            <img id="review-avatar" src="" class="w-20 h-20 rounded-full mx-auto mb-3 border-4 border-gray-100 object-cover">
            <h3 id="review-name" class="font-bold text-lg text-gray-800"></h3>
            <p id="review-phone" class="text-xs text-gray-400 dir-ltr mb-4"></p>
            <p id="review-bio" class="text-xs text-gray-600 bg-gray-50 p-4 rounded-2xl mb-6 italic"></p>
            <input type="hidden" id="review-target-phone">
            <div class="flex gap-3">
                <button onclick="confirmVerification()" class="flex-1 bg-green-500 text-white font-bold py-3.5 rounded-2xl">قبول</button>
                <button onclick="rejectVerification()" class="flex-1 bg-red-500 text-white font-bold py-3.5 rounded-2xl">رفض</button>
            </div>
        </div>
    </div>

    <!-- جروبات -->
    <div id="create-group-modal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden p-6 text-center">
            <div class="relative w-20 h-20 mx-auto mb-4">
                <img id="new-group-preview" src="https://ui-avatars.com/api/?name=G&background=0ea5e9&color=fff" class="w-full h-full rounded-full object-cover border-2 border-white shadow-md">
                <button onclick="triggerImageUpload('newGroup')" class="absolute bottom-0 right-0 bg-kimo-main text-white rounded-full w-7 h-7 flex items-center justify-center border-2 border-white shadow-md"><i class="fas fa-camera text-[10px]"></i></button>
            </div>
            <input type="text" id="group-name-input" placeholder="اسم المجموعة..." class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none mb-6 font-bold text-center">
            <div class="flex gap-3"><button onclick="createNewGroup()" class="flex-1 bg-kimo-main text-white font-bold py-3.5 rounded-2xl">إنشاء</button><button onclick="closeCreateGroupModal()" class="flex-1 bg-gray-200 text-gray-600 font-bold py-3.5 rounded-2xl">إلغاء</button></div>
        </div>
    </div>
    <div id="group-settings-modal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-end md:items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-full md:max-w-md rounded-t-3xl md:rounded-3xl overflow-hidden shadow-2xl transition-all transform translate-y-full duration-300" id="group-settings-content">
            <div class="bg-gray-800 p-4 text-white flex justify-between items-center font-bold"><h3>معلومات المجموعة</h3><button onclick="closeGroupSettingsModal()"><i class="fas fa-times text-xl"></i></button></div>
            <div class="p-6 space-y-4 bg-gray-50 text-right">
                <div id="group-admin-tools" class="flex flex-col items-center bg-white p-4 rounded-2xl border border-gray-100 hidden">
                    <div class="relative w-16 h-16 mb-2">
                        <img id="edit-group-preview" src="" class="w-full h-full rounded-full object-cover">
                        <button onclick="triggerImageUpload('editGroup')" class="absolute bottom-0 right-0 bg-kimo-main text-white w-7 h-7 rounded-full flex items-center justify-center border border-white shadow-md"><i class="fas fa-camera text-[10px]"></i></button>
                    </div>
                    <input type="text" id="edit-group-name" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-xl outline-none font-bold text-center mb-3">
                    <button onclick="updateGroupDetails()" class="w-full bg-green-500 text-white font-bold py-2.5 rounded-xl text-xs">حفظ</button>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-gray-100"><h4 class="font-bold text-xs mb-3 text-gray-400">إضافة عضو بالرقم:</h4><div class="flex gap-2"><input type="tel" id="add-member-input" placeholder="010xxxxxxxx" class="flex-1 p-2 bg-gray-50 border rounded-xl font-bold text-sm text-center dir-ltr"><button onclick="addMemberToGroup()" class="bg-kimo-main text-white font-bold px-4 rounded-xl text-xs">إضافة</button></div></div>
                <div id="group-action-buttons"></div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         4. JAVASCRIPT LOGIC
    =========================================== -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBS3GcNh5ltgwUqSClSTUoRNgdJiTOf0RM",
            authDomain: "whatsapp-fcd3c.firebaseapp.com",
            projectId: "whatsapp-fcd3c",
            storageBucket: "whatsapp-fcd3c.firebasestorage.app",
            messagingSenderId: "369090984748",
            appId: "1:369090984748:web:cba013025b108578cd0a89"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const ADMIN_PHONE = "+201112215950";
        let currentUserPhone = localStorage.getItem('kimo_phone'); 
        let activeChatId = null, isGroupChat = false, unsubscribeMessages = null;
        let usersCache = {}, groupsList = [], myContacts = [], tempPhoneInput = "";
        let currentImageTarget = '', profileBase64 = '', newGroupBase64 = '', editGroupBase64 = '';
        
        // متغيرات الفويس
        let mediaRecorder, audioChunks = [], recordingInterval, recordingTime = 0;

        // Splash screen cleanup
        setTimeout(() => {
            document.getElementById('splash-screen').classList.add('opacity-0');
            setTimeout(() => { 
                document.getElementById('splash-screen').classList.add('hidden'); 
                if(currentUserPhone) initApp(); else document.getElementById('auth-screen').classList.remove('hidden');
            }, 500);
        }, 1500);

        // --- نظام رفع الصور (البروفايل والجروبات) ---
        function triggerImageUpload(t) { currentImageTarget = t; document.getElementById('global-image-picker').click(); }
        document.getElementById('global-image-picker').onchange = e => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = ev => {
                const i = new Image(); i.onload = () => {
                    const c = document.createElement('canvas'); let w = i.width, h = i.height, MAX = 400;
                    if(w > h) { if(w > MAX) { h *= MAX / w; w = MAX; } } else { if(h > MAX) { w *= MAX / h; h = MAX; } }
                    c.width = w; c.height = h; c.getContext('2d').drawImage(i, 0, 0, w, h);
                    const b = c.toDataURL('image/jpeg', 0.7);
                    if(currentImageTarget==='profile') { profileBase64=b; document.getElementById('profile-preview-img').src=b; }
                    else if(currentImageTarget==='newGroup') { newGroupBase64=b; document.getElementById('new-group-preview').src=b; }
                    else if(currentImageTarget==='editGroup') { editGroupBase64=b; document.getElementById('edit-group-preview').src=b; }
                }; i.src = ev.target.result;
            }; r.readAsDataURL(f);
        };

        // --- نظام المرفقات في الشات ---
        function triggerChatAttachment() { document.getElementById('chat-attachment-picker').click(); }
        document.getElementById('chat-attachment-picker').onchange = e => {
            const f = e.target.files[0]; if(!f) return;
            if(f.type.startsWith('image/')) {
                const r = new FileReader(); r.onload = ev => {
                    const i = new Image(); i.onload = () => {
                        const c = document.createElement('canvas'); let w = i.width, h = i.height, MAX = 800;
                        if(w > h) { if(w > MAX) { h *= MAX / w; w = MAX; } } else { if(h > MAX) { w *= MAX / h; h = MAX; } }
                        c.width = w; c.height = h; c.getContext('2d').drawImage(i, 0, 0, w, h);
                        sendFileMsg('image', c.toDataURL('image/jpeg', 0.6), 'صورة');
                    }; i.src = ev.target.result;
                }; r.readAsDataURL(f);
            } else {
                if(f.size > 700*1024) return alert("الملف كبير جداً!");
                const r = new FileReader(); r.onload = ev => sendFileMsg('file', ev.target.result, f.name); r.readAsDataURL(f);
            }
        };

        // --- نظام الفويس مسدج (Voice Recording) ---
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const base64Audio = reader.result;
                        await sendFileMsg('voice', base64Audio, 'رسالة صوتية');
                    };
                    reader.readAsDataURL(audioBlob);
                };

                mediaRecorder.start();
                showRecordingUI();
            } catch (err) {
                alert("يرجى السماح باستخدام الميكروفون للتسجيل.");
            }
        }

        function showRecordingUI() {
            document.getElementById('voice-recording-ui').classList.remove('hidden');
            recordingTime = 0;
            document.getElementById('recording-timer').innerText = "00:00";
            recordingInterval = setInterval(() => {
                recordingTime++;
                const mins = Math.floor(recordingTime / 60).toString().padStart(2, '0');
                const secs = (recordingTime % 60).toString().padStart(2, '0');
                document.getElementById('recording-timer').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function stopAndSendRecording() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                clearInterval(recordingInterval);
                document.getElementById('voice-recording-ui').classList.add('hidden');
            }
        }

        function cancelRecording() {
            if (mediaRecorder) {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                clearInterval(recordingInterval);
                audioChunks = [];
                document.getElementById('voice-recording-ui').classList.add('hidden');
            }
        }

        async function sendFileMsg(type, data, fileName) {
            if(!activeChatId) return; const chatId = isGroupChat ? activeChatId : [currentUserPhone, activeChatId].sort().join('_');
            await db.collection('messages').add({ chatId, text: '', type, fileData: data, fileName, sender: currentUserPhone, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        }

        // تحويل زر المايك لزر إرسال عند الكتابة
        document.getElementById('message-input').oninput = e => {
            const hasText = e.target.value.trim().length > 0;
            document.getElementById('btn-voice').classList.toggle('hidden', hasText);
            document.getElementById('btn-send').classList.toggle('hidden', !hasText);
        };

        // --- الدخول ---
        function requestOTP() {
            let p = document.getElementById('phone-input').value.trim(); if(!p) return alert('أدخل الرقم');
            if(p.startsWith('0')) p = p.substring(1); tempPhoneInput = p.startsWith('+20') ? p : '+20' + p;
            document.getElementById('phone-container').classList.add('hidden'); document.getElementById('otp-container').classList.remove('hidden');
        }
        async function verifyCode() {
            const pin = document.getElementById('otp-input').value.trim(); if(!pin) return alert("أدخل الكود");
            const userRef = db.collection('users').doc(tempPhoneInput); const snap = await userRef.get();
            if (snap.exists) { if (pin !== (snap.data().loginCode || '000000')) return alert("الكود خطأ!"); }
            else { if (pin !== '000000') return alert("كود الجديد 000000"); await userRef.set({ phone: tempPhoneInput, displayName: tempPhoneInput, bio: 'أستخدم كيمو اب!', avatar: '', isVerified: false, isBusiness: false, font: 'font-cairo', frame: 'frame-none', loginCode: '000000', contacts: [], createdAt: firebase.firestore.FieldValue.serverTimestamp() }); }
            currentUserPhone = tempPhoneInput; localStorage.setItem('kimo_phone', currentUserPhone); initApp();
        }
        function logout() { localStorage.clear(); location.reload(); }

        // --- تهيئة التطبيق ---
        function initApp() {
            document.getElementById('auth-screen').classList.add('hidden'); 
            document.getElementById('app-content').classList.remove('hidden');
            let isAdmin = currentUserPhone === ADMIN_PHONE;
            if(isAdmin) { document.getElementById('admin-panel-btn').classList.remove('hidden'); document.getElementById('admin-settings-zone').classList.remove('hidden'); db.collection('verifications').onSnapshot(s => document.getElementById('admin-req-badge').classList.toggle('hidden', s.empty)); }
            
            db.collection('users').doc(currentUserPhone).onSnapshot(s => {
                if(s.exists) {
                    const me = s.data(); myContacts = me.contacts || [];
                    document.getElementById('my-admin-crown').classList.toggle('hidden', !isAdmin);
                    document.getElementById('my-name-display').innerText = me.displayName;
                    document.getElementById('my-name-display').className = `font-bold text-sm truncate ${isAdmin?'font-lalezar':(me.isBusiness?me.font:'')}`;
                    document.getElementById('my-bio-display').innerText = me.bio;
                    const avatarSrc = me.avatar || `https://ui-avatars.com/api/?name=${me.displayName}&background=0ea5e9&color=fff`;
                    document.getElementById('my-avatar-img').src = avatarSrc;
                    document.getElementById('profile-preview-img').src = avatarSrc; profileBase64 = me.avatar || '';
                    document.getElementById('my-avatar-wrap').className = `w-10 h-10 rounded-full shrink-0 relative ${isAdmin?'frame-admin':(me.isBusiness?me.frame:'')}`;
                    document.getElementById('my-verified-badge').classList.toggle('hidden', !me.isVerified);
                    document.getElementById('set-name').value = me.displayName || ''; document.getElementById('set-bio').value = me.bio || '';
                    document.getElementById('biz-toggle').checked = me.isBusiness; document.getElementById('biz-zone').classList.toggle('hidden', !me.isBusiness);
                    document.getElementById('set-font').value = me.font || 'font-cairo';
                    if(isAdmin) document.getElementById('set-auto-reply').value = me.autoReplyMessage || '';
                    setFrame(me.frame || 'frame-none'); renderContactsList();
                }
            });

            db.collection('users').onSnapshot(s => { s.docs.forEach(d => usersCache[d.id] = d.data()); renderContactsList(); });
            db.collection('groups').where('members', 'array-contains', currentUserPhone).onSnapshot(s => { groupsList = s.docs.map(d => ({id: d.id, ...d.data()})); renderContactsList(); });
        }

        function renderContactsList() {
            const list = document.getElementById('contacts-list'); list.innerHTML = ''; let count = 0;
            groupsList.forEach(g => { count++; const av = g.avatar || `https://ui-avatars.com/api/?name=${g.name}&background=0ea5e9&color=fff`; list.innerHTML += `<div class="flex items-center px-4 py-3.5 cursor-pointer hover:bg-gray-50 border-b border-gray-50" onclick="openChatView('${g.id}', true)"><div class="w-11 h-11 rounded-full mr-3 shrink-0"><img src="${av}" class="w-full h-full rounded-full object-cover"></div><div class="flex-1 overflow-hidden"><h3 class="font-bold text-sm text-kimo-text truncate">${g.name}</h3><p class="text-[10px] text-kimo-main font-bold">مجموعة</p></div></div>`; });
            Object.values(usersCache).forEach(u => {
                if(u.phone === currentUserPhone || !myContacts.includes(u.phone)) return; count++;
                let isAd = u.phone === ADMIN_PHONE, fr = isAd?'frame-admin':(u.isBusiness?u.frame:''), fo = isAd?'font-lalezar text-yellow-600':(u.isBusiness?u.font:''), av = u.avatar || `https://ui-avatars.com/api/?name=${u.displayName}&background=random`;
                list.innerHTML += `<div class="flex items-center px-4 py-3.5 cursor-pointer hover:bg-gray-50 border-b border-gray-50 transition" onclick="openChatView('${u.phone}', false)"><div class="mr-3 shrink-0 relative ${fr} w-11 h-11 rounded-full"><img src="${av}" class="w-full h-full rounded-full object-cover bg-gray-50">${isAd?'<i class="fas fa-crown text-yellow-500 absolute -top-1 -right-1 text-[10px]"></i>':''}</div><div class="flex-1 overflow-hidden"><div class="flex items-center gap-1 mb-0.5"><h3 class="${fo} text-sm truncate">${u.displayName}</h3>${u.isVerified ? '<i class="fas fa-check-circle text-blue-500 text-[10px]"></i>':''}</div><p class="text-[10px] text-gray-400 truncate font-semibold">${u.bio}</p></div></div>`;
            });
            if(count === 0) list.innerHTML = `<div class="p-10 text-center text-gray-300 font-bold">ابدأ بإضافة صديق...</div>`;
        }

        // --- الشات والسكول والترتيب ---
        function openChatView(id, isG) {
            activeChatId = id; isGroupChat = isG; 
            document.getElementById('welcome-screen').classList.add('hidden'); 
            document.getElementById('chat-area').classList.remove('hidden', 'md:flex');
            document.getElementById('chat-area').classList.add('flex');
            document.getElementById('sidebar').classList.add('hidden', 'md:flex');
            
            const t = document.getElementById('active-chat-title'), a = document.getElementById('active-chat-avatar'), s = document.getElementById('active-chat-status'), w = document.getElementById('chat-header-avatar-wrap'), v = document.getElementById('active-chat-verified'), cr = document.getElementById('active-chat-admin-crown');
            if(isG) { const g = groupsList.find(gr => gr.id === id); t.innerText = g?g.name:'..'; a.src = g.avatar || `https://ui-avatars.com/api/?name=${t.innerText}`; s.innerText = 'مجموعة'; v.classList.add('hidden'); cr.classList.add('hidden'); w.className = "w-11 h-11 rounded-full shrink-0 relative mx-2"; }
            else { const u = usersCache[id]; if(u) { let isAd = u.phone === ADMIN_PHONE; t.innerText = u.displayName; t.className = `font-bold text-sm truncate ${isAd?'font-lalezar':''}`; a.src = u.avatar || `https://ui-avatars.com/api/?name=${u.displayName}`; s.innerText = u.bio; v.classList.toggle('hidden', !u.isVerified); cr.classList.toggle('hidden', !isAd); w.className = `w-11 h-11 rounded-full shrink-0 relative mx-2 ${isAd?'frame-admin':(u.isBusiness?u.frame:'')}`; } }
            loadMessages();
        }

        function closeChatArea() {
            document.getElementById('chat-area').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            activeChatId = null;
        }

        function loadMessages() {
            const wrap = document.getElementById('messages-wrapper'), cont = document.getElementById('messages-container'), chatId = isGroupChat ? activeChatId : [currentUserPhone, activeChatId].sort().join('_');
            if(unsubscribeMessages) unsubscribeMessages();
            unsubscribeMessages = db.collection('messages').where('chatId', '==', chatId).onSnapshot(s => {
                let msgs = []; s.forEach(doc => msgs.push({ id: doc.id, ...doc.data() }));
                msgs.sort((a,b) => (a.timestamp?.toMillis() || 0) - (b.timestamp?.toMillis() || 0));
                wrap.innerHTML = `<div class="flex justify-center my-4"><span class="bg-white/80 text-[10px] py-1 px-4 rounded-full border border-blue-100 text-blue-800 font-bold shadow-sm"><i class="fas fa-lock ml-1"></i> محادثات كيمو اب مشفرة وآمنة</span></div>`;
                msgs.forEach(m => {
                    const isMe = m.sender === currentUserPhone; let time = m.timestamp?m.timestamp.toDate().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}):'';
                    let content = '';
                    if(m.type === 'image') content = `<img src="${m.fileData}" class="w-full rounded-xl mt-1 shadow-sm" onclick="window.open(this.src)">`;
                    else if(m.type === 'file') content = `<a href="${m.fileData}" download="${m.fileName}" class="bg-black/5 p-3 rounded-xl flex justify-between items-center text-[10px] border border-black/5"><i class="fas fa-file-alt text-kimo-main text-lg"></i><span class="font-bold truncate max-w-[120px]">${m.fileName}</span><i class="fas fa-download"></i></a>`;
                    else if(m.type === 'voice') content = `<audio controls class="voice-msg-player mt-1"><source src="${m.fileData}" type="audio/webm"></audio>`;
                    else content = `<p class="text-[14.5px] font-semibold leading-relaxed text-gray-800">${m.text}</p>`;

                    wrap.insertAdjacentHTML('beforeend', `<div class="flex flex-col ${isMe?'items-end':'items-start'} w-full"><div class="${isMe?'msg-out':'msg-in'} max-w-[85%] md:max-w-[70%] px-3 pt-2 pb-1 relative border border-black/5 shadow-sm min-w-[90px]">${!isMe && isGroupChat ? `<p class="text-[10px] font-bold text-kimo-main mb-1">${usersCache[m.sender]?.displayName || '..'}</p>` : ''}${content}<div class="flex items-center justify-end gap-1 mt-1 opacity-50"><p class="text-[8px] font-bold">${time}</p>${isMe?'<i class="fas fa-check-double text-blue-400 text-[9px]"></i>':''}</div></div></div>`);
                });
                cont.scrollTop = cont.scrollHeight;
            });
        }

        async function sendMsg() {
            const i = document.getElementById('message-input'), text = i.value.trim(); if(!text || !activeChatId) return;
            const chatId = isGroupChat ? activeChatId : [currentUserPhone, activeChatId].sort().join('_');
            i.value = ''; i.focus();
            document.getElementById('btn-voice').classList.remove('hidden');
            document.getElementById('btn-send').classList.add('hidden');
            await db.collection('messages').add({ chatId, text, type: 'text', sender: currentUserPhone, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        }

        async function startNewChat() {
            let p = prompt("أدخل رقم الهاتف:"); if(!p) return;
            if(p.startsWith('0')) p = p.substring(1); p = p.startsWith('+20') ? p : '+20' + p;
            if(p === currentUserPhone) return alert("لا تراسل نفسك");
            const s = await db.collection('users').doc(p).get();
            if(s.exists) { 
                await db.collection('users').doc(currentUserPhone).update({ contacts: firebase.firestore.FieldValue.arrayUnion(p) }); 
                await db.collection('users').doc(p).update({ contacts: firebase.firestore.FieldValue.arrayUnion(currentUserPhone) }); 
                openChatView(p, false); 
            } else alert("هذا الرقم غير مسجل!");
        }

        // --- باقي الوظائف ---
        function openProfile() { document.getElementById('settings-modal').classList.remove('hidden'); setTimeout(()=> document.getElementById('settings-modal-content').classList.remove('translate-y-full'), 10); }
        function closeProfile() { document.getElementById('settings-modal-content').classList.add('translate-y-full'); setTimeout(()=> document.getElementById('settings-modal').classList.add('hidden'), 300); }
        function toggleBiz() { document.getElementById('biz-zone').classList.toggle('hidden', !document.getElementById('biz-toggle').checked); }
        function setFrame(f) { document.getElementById('selected-frame').value = f; ['f-none','f-gold','f-grad'].forEach(id => document.getElementById(id).className = `w-8 h-8 rounded-full border ${id==='f-'+f.split('-')[1]?'border-kimo-main ring-4 ring-kimo-light':'border-gray-300'}`); }
        async function saveProfile() {
            let upd = { displayName: document.getElementById('set-name').value.trim(), bio: document.getElementById('set-bio').value.trim(), avatar: profileBase64, isBusiness: document.getElementById('biz-toggle').checked, font: document.getElementById('set-font').value, frame: document.getElementById('selected-frame').value };
            const pin = document.getElementById('set-login-code').value.trim(); if(pin) upd.loginCode = pin;
            if(currentUserPhone === ADMIN_PHONE) upd.autoReplyMessage = document.getElementById('set-auto-reply').value.trim();
            await db.collection('users').doc(currentUserPhone).set(upd, { merge: true }); closeProfile();
        }
        async function requestVerification() { await db.collection('verifications').doc(currentUserPhone).set({ phone: currentUserPhone, name: usersCache[currentUserPhone].displayName, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); alert("تم الطلب."); }
        function openAdminPanel() {
            document.getElementById('admin-modal').classList.remove('hidden'); const list = document.getElementById('admin-requests-list');
            db.collection('verifications').onSnapshot(s => {
                if(s.empty) { list.innerHTML = '<p class="text-center p-10 text-gray-400 font-bold">لا يوجد طلبات.</p>'; return; }
                list.innerHTML = ''; s.forEach(doc => { const r = doc.data(); list.innerHTML += `<div class="bg-white p-4 rounded-2xl mb-3 shadow-sm flex justify-between items-center border border-gray-100"><p class="font-bold text-xs">${r.name}</p><button onclick="viewUserProfile('${r.phone}')" class="bg-kimo-main text-white px-4 py-2 rounded-xl text-[10px] font-bold">مراجعة</button></div>`; });
            });
        }
        function closeAdminPanel() { document.getElementById('admin-modal').classList.add('hidden'); }
        function viewUserProfile(p) { const u = usersCache[p]; document.getElementById('review-avatar').src = u.avatar || `https://ui-avatars.com/api/?name=${u.displayName}`; document.getElementById('review-name').innerText = u.displayName; document.getElementById('review-phone').innerText = u.phone; document.getElementById('review-bio').innerText = u.bio; document.getElementById('review-target-phone').value = u.phone; document.getElementById('admin-review-modal').classList.remove('hidden'); }
        async function confirmVerification() { const p = document.getElementById('review-target-phone').value; await db.collection('users').doc(p).update({ isVerified: true }); await db.collection('verifications').doc(p).delete(); document.getElementById('admin-review-modal').classList.add('hidden'); }
        async function rejectVerification() { await db.collection('verifications').doc(document.getElementById('review-target-phone').value).delete(); document.getElementById('admin-review-modal').classList.add('hidden'); }

        function openCreateGroupModal() { document.getElementById('create-group-modal').classList.remove('hidden'); }
        function closeCreateGroupModal() { document.getElementById('create-group-modal').classList.add('hidden'); }
        async function createNewGroup() { const n = document.getElementById('group-name-input').value.trim(); if(!n) return; await db.collection('groups').add({ name: n, avatar: newGroupBase64, createdBy: currentUserPhone, members: [currentUserPhone], createdAt: firebase.firestore.FieldValue.serverTimestamp() }); closeCreateGroupModal(); }
        function handleChatHeaderClick() {
            if(!isGroupChat) return; const g = groupsList.find(gr => gr.id === activeChatId); if(!g) return; const isOwn = g.createdBy === currentUserPhone;
            document.getElementById('edit-group-name').value = g.name; document.getElementById('edit-group-preview').src = g.avatar || `https://ui-avatars.com/api/?name=${g.name}`;
            document.getElementById('group-admin-tools').classList.toggle('hidden', !isOwn);
            document.getElementById('group-action-buttons').innerHTML = isOwn ? `<button onclick="deleteCurrentGroup()" class="w-full py-4 rounded-2xl border-2 border-red-500 text-red-500 font-bold text-xs">حذف المجموعة</button>` : `<button onclick="leaveCurrentGroup()" class="w-full py-4 rounded-2xl bg-red-50 text-red-500 font-bold text-xs">خروج</button>`;
            document.getElementById('group-settings-modal').classList.remove('hidden'); setTimeout(()=> document.getElementById('group-settings-content').classList.remove('translate-y-full'), 10);
        }
        function closeGroupSettingsModal() { document.getElementById('group-settings-content').classList.add('translate-y-full'); setTimeout(()=> document.getElementById('group-settings-modal').classList.add('hidden'), 300); }
        async function updateGroupDetails() { await db.collection('groups').doc(activeChatId).update({ name: document.getElementById('edit-group-name').value.trim(), avatar: editGroupBase64 }); closeGroupSettingsModal(); }
        async function addMemberToGroup() { let p = document.getElementById('add-member-input').value.trim(); if(p.startsWith('0')) p = p.substring(1); p = p.startsWith('+20') ? p : '+20' + p; const s = await db.collection('users').doc(p).get(); if(!s.exists) return alert("غير مسجل!"); await db.collection('groups').doc(activeChatId).update({ members: firebase.firestore.FieldValue.arrayUnion(p) }); alert("تمت الإضافة!"); }
        async function deleteCurrentGroup() { if(confirm("حذف؟")) { await db.collection('groups').doc(activeChatId).delete(); closeChatArea(); closeGroupSettingsModal(); } }
        async function leaveCurrentGroup() { if(confirm("خروج؟")) { await db.collection('groups').doc(activeChatId).update({ members: firebase.firestore.FieldValue.arrayRemove(currentUserPhone) }); closeChatArea(); closeGroupSettingsModal(); } }
    </script>
